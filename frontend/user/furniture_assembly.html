<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HandyFix | Leak Repair</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">

    <style>
        .back-btn-circle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            transition: background-color 0.3s ease;
            color: #4A0E0E;
            text-decoration: none;
        }

        .back-btn-circle:hover {
            background-color: rgba(0, 0, 0, 0.08); /* Light gray circle on hover */
            color: #4A0E0E;
        }
        
        .border-dashed { border-style: dashed; }

        .form-control:focus, .form-select:focus {
            border-color: #E5A832;
            box-shadow: 0 0 0 0.25rem rgba(229, 168, 50, 0.25);
        }

        .summary-label { color: #6c757d; font-size: 0.85rem; font-weight: bold; }
        .summary-value { color: #4A0E0E; font-weight: 600; }

    </style>
</head>
<body>

    <div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 p-0 text-white min-vh-100 shadow d-flex flex-column justify-content-between"
                style="background-color: #4A0E0E; position: fixed;">
                <div>
                    <div class="p-4 text-center">
                        <h4 class="fw-bold m-0">LOGO</h4>
                        <small style="color: #E5A832; letter-spacing: 2px; font-weight: bold;">HandyFix</small>
                    </div>

                    <ul class="nav flex-column mt-4 ps-3">
                        <li class="nav-item mb-2">
                            <a href="home.html" id="dashboardLink" class="nav-link text-white fw-bold active-link">
                                <i class="bi bi-house-door-fill me-2"></i>Home</a>
                        </li>

                        <li class="nav-item mb-2">
                            <a class="nav-link text-white opacity-75 fw-bold d-flex align-items-center"
                                id="servicesToggle" data-bs-toggle="collapse" href="#servicesSubmenu" role="button">
                                <i class="bi bi-list-ul me-2"></i>
                                <span>Services</span>
                            </a>

                            <div class="collapse" id="servicesSubmenu">
                                <ul class="nav flex-column ms-4 mt-2 mb-2 border-start border-secondary">
                                    <li class="nav-item">
                                        <a name="plumbing" onclick="repairNav(this)"
                                            class="nav-link text-white opacity-75 py-1 small">
                                            <i class="bi bi-droplet-fill me-2"></i> Plumbing Services</a>
                                    </li>
                                    <li class="nav-item">
                                        <a name="maintenance" onclick="repairNav(this)"
                                            class="nav-link text-white opacity-75 py-1 small">
                                            <i class="bi bi-house-check-fill me-2"></i>Home Maintenance</a>
                                    </li>
                                    <li class="nav-item">
                                        <a name="electrical" onclick="repairNav(this)"
                                            class="nav-link text-white opacity-75 py-1 small">
                                            <i class="bi bi-lightning-charge-fill me-2"></i>Electrical Services</a>
                                    </li>
                                    <li class="nav-item">
                                        <a name="carpentry" onclick="repairNav(this)"
                                            class="nav-link text-white opacity-75 py-1 small">
                                            <i class="bi bi-tools me-2"></i>Carpentry Services</a>
                                    <li class="nav-item">
                                        <a name="tool" onclick="repairNav(this)"
                                            class="nav-link text-white opacity-75 py-1 small">
                                            <i class="bi bi-briefcase-fill me-2"></i>Tool Services</a>
                                    </li>
                                </ul>
                        </li>
                        </li>
                        <li class="nav-item mb-2">
                            <a href="/user/booking" class="nav-link text-white opacity-75 fw-bold"><i
                                    class="bi bi-calendar-check me-2"></i> My Bookings</a>
                        </li>
                        <li class="nav-item mb-2">
                            <a href="/user/messages" class="nav-link text-white opacity-75 fw-bold"><i
                                    class="bi bi-chat-dots me-2"></i> Messages</a>
                        </li>
                        <li class="nav-item mb-2">
                            <a href="/user/profile" class="nav-link text-white opacity-75 fw-bold"><i
                                    class="bi bi-person-circle me-2"></i> Profile</a>
                        </li>
                        <li class="nav-item mb-2">
                            <a href="/user/support" class="nav-link text-white opacity-75 fw-bold"><i
                                    class="bi bi-question-circle me-2"></i> Help & Support</a>
                        </li>
                        <li class="nav-item mb-2">
                            <a href="/user/settings" class="nav-link text-white opacity-75 fw-bold small"><i
                                    class="bi bi-gear me-2"></i> Settings</a>
                        </li>
                        <li class="nav-item">
                            <a href="/login" class="nav-link text-white opacity-75 fw-bold small"><i
                                    class="bi bi-box-arrow-right me-2"></i> Logout</a>
                        </li>
                    </ul>
                </div>
            </nav>



            <main class="col-md-10 offset-md-2 p-5">
                <div class="d-flex align-items-center mb-4">
                    <a href="carpentry.html" class="back-btn-circle me-2">
                        <i class="bi bi-arrow-left fs-2"></i>
                    </a>
                    <div class="d-flex flex-column">
                        <h2 class="fw-bold m-0" style="color: #4A0E0E; line-height: 1;">Carpentry Services</h2>
                    </div>
                </div>

                <div class="card shadow-sm border-0">
                    <div class="card-body p-5">
                        <h3 class="fw-bold mb-4" style="color: #4A0E0E;">Furniture Assembly</h3>
                        
                        <div class="progress mb-5" style="height: 5px;">
                            <div class="progress-bar" id="pBar" role="progressbar" style="width: 33%; background-color: #E5A832;"></div>
                        </div>

                        <div id="bookingFormMount" data-service-name="Furniture Assembly" data-issue-options='["Unboxing furniture pieces", "Assembly of all components", "Tightening screws and bolts", "Basic safety check", "Others (Please specify in details below)"]'></div>

                    </div> 
                </div> 
                </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="/user/js/serviceBookingFlow.js"></script>

</html>
