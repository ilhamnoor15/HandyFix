<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HandyFix | Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/user/style.css"/>


    <style>

        .info-header h3 {
            color: #800000;
            font-size: 24px; 
            margin: 0;
            white-space: nowrap;
        }

        .back-link {
            color: #800000; 
            font-size: 20px; 
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: 0.2s;
        }


        .back-link:hover {
            color: #600000; 
            transform: translateX(-3px); 
        }

    </style>

</head>
<body>


<div class="container-fluid">
    <div class="row">
                    <script src="shared-nav.js"></script>
<main class="content-area" style="width: 100%; padding: 3rem 2rem; background-color: #f9f9f9; min-height: 100vh; display: flex; justify-content: center; overflow-x: hidden;">
    
    <div class="personal-info-container" style="width: 100%; max-width: 900px; margin-left: 180px;">

        <div class="info-header mb-5 d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center">
                <a href="profile.html" class="back-link">
                    <i class="bi bi-arrow-left fs-3" style="color: #800000;"></i>
                </a>
                <h2 class="ms-4 mb-0 fw-bold" style="color: #800000;">Profile Overview</h2>
            </div>
            <span class="badge rounded-pill bg-white text-dark border shadow-sm px-4 py-2 fs-6">
                <i class="bi bi-shield-check text-success me-2"></i> Verified Account
            </span>
        </div>

        <div class="transaction-section">
            <div class="service-item shadow-sm p-4 mb-4 bg-white rounded-4 d-flex justify-content-between align-items-center border">
                <div class="d-flex align-items-center gap-4">
                    <div class="service-icon d-flex align-items-center justify-content-center" 
                         style="background-color: #FFF9E1; width: 60px; height: 60px; border-radius: 15px;">
                        <i class="bi bi-receipt text-warning fs-3"></i>
                    </div>
                    <div>
                        <h4 class="mb-1 fw-bold">Transaction Records</h4>
                        <p class="text-muted mb-0">View your payment history and invoices</p>
                    </div>
                </div>
                <i class="bi bi-chevron-right text-muted fs-4"></i>
            </div>

            <div class="bg-white shadow-sm rounded-4 p-5 border">
                <h5 class="text-muted fw-bold mb-4 text-uppercase" style="letter-spacing: 1.2px; font-size: 0.85rem;">Recent Payments</h5>
                
                <div class="d-flex justify-content-between align-items-center py-4 border-bottom">
                    <div class="d-flex align-items-center gap-4">
                        <div style="width: 10px; height: 10px; background-color: #198754; border-radius: 50%;"></div>
                        <div>
                            <h5 class="mb-1 fw-bold">Leak Repair (Plumbing)</h5>
                            <span class="text-muted">March 27, 2026</span>
                        </div>
                    </div>
                    <span class="fw-bold fs-4">₱1,500.00</span>
                </div>

                <div class="d-flex justify-content-between align-items-center py-4">
                    <div class="d-flex align-items-center gap-4">
                        <div style="width: 10px; height: 10px; background-color: #198754; border-radius: 50%;"></div>
                        <div>
                            <h5 class="mb-1 fw-bold">Outlet & Switch Repair (Electrical)</h5>
                            <span class="text-muted">March 19, 2026</span>
                        </div>
                    </div>
                    <span class="fw-bold fs-4">₱970.00</span>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const servicesToggle = document.getElementById('servicesToggle');
    const dashboardLink = document.getElementById('dashboardLink');

    servicesToggle.addEventListener('click', function() {
        dashboardLink.classList.remove('active-link');
        dashboardLink.classList.add('opacity-75');

        this.classList.add('clicked-service');
        this.classList.remove('opacity-75');
    });
    function repairNav(data){
        window.location.href = `/user/repairs?repair=${data.name}`;
    }
</script>

</body>
</html>
