<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HandyFix | Log In</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/user/style.css"/>
</head>

<body>

    <div class="main-container">
        
        <div class="left-panel">
            <div class="bg-logo">H</div>
            <div class="branding-content text-start">
                <h1 class="mb-4"style="font-size: 5rem; line-height: 1;">Your trusted partner <br> for a better home.</h1>
                <h3 class="fw-light mb-5" style="opacity: 0.9;">Find trusted professionals for your home <br> repairs in just a few clicks.</h3>
                <h3 class="fw-bold mb-5">Join HandyFix today.</h3>
            </div>
        </div>

        <div class="right-panel">
            <div class="login-card">
                
                <div class="branding">
                    <h1 class="logo-text-maroon">LOGO</h1>
                    <p class="sub-logo-text">HandyFix</p>
                </div>

                <h5 class="fw-bold mb-4" style="color: #8B2323; letter-spacing: 0.5px;">Log in to your account</h5>

                <form>
                    <div class="input-wrapper">
                        <span><i class="bi bi-person"></i></span>
                        <input type="email" class="form-control" placeholder="Username">
                    </div>

                    <div class="input-wrapper">
                        <span><i class="bi bi-lock"></i></span>                        
                        <input type="password" class="form-control" placeholder="Password">
                    </div>

                    <div class="mt-4">
                        <a href="home.html" class="btn btn-gold w-100 py-2 fw-bold text-decoration-none text-center">Log In</a>
                    </div>

                    <p class="mt-4 text-muted small">
                        No account yet? <a href="register.html" class="signup-link">Register</a>
                    </p>
                </form>

            </div>
        </div>

    </div>

</body>
</html>
