<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HandyFix - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/user/style.css"/>
    

</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card border-0 shadow-sm p-4 py-5 rounded-4 text-center" style="width: 100%; max-width: 420px;">
        
        <div class="logo-wrapper">
            <h1 class="logo-text-main">LOGO</h1>
            <span class="logo-text-sub">HandyFix</span>
            <h4 class="page-header-title">Create an account</h4>
        </div>

        <form>
            <div class="input-group mb-3">
                <span class="input-group-text"><i class="fas fa-user"></i></span>
                <input type="text" class="form-control custom-input shadow-none" placeholder="Username" required>
            </div>

            <div class="input-group mb-3">
                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                <input type="email" class="form-control custom-input shadow-none" placeholder="Email Address" required>
            </div>

            <div class="input-group mb-3">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" class="form-control custom-input shadow-none" placeholder="Password" required>
            </div>

            <div class="input-group mb-4">
                <span class="input-group-text"><i class="fas fa-check-circle"></i></span>
                <input type="password" class="form-control custom-input shadow-none" placeholder="Confirm Password" required>
            </div>

            <button type="submit" class="btn btn-register w-100 text-white rounded-3 mb-3">
                Register
            </button>
        </form>

        <p class="small text-muted mb-0">
            Already have an account? <a href="login.html" class="login-link">Log In</a>
        </p>
    </div>
</div>

</body>
</html>
