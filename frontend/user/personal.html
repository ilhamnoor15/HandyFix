<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HandyFix | Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">

    <style>
        .personal-info-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 100%;
            max-width: 900px; 
            margin: 0 auto; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);

            margin-left: auto;
            margin-right: auto;
            display: block;
        }

        .content-area {
            margin-left: 16.66%; 
            width: calc(100% - 16.66%);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 50px;
            min-height: 100vh;
            background-color: #f8f9fa;

            padding-top: 100px;
        }

        .info-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid #FFF5F5;
        }


        .info-header h3 {
            color: #800000;
            font-size: 24px; 
            margin: 0;
            white-space: nowrap;
        }

        .edit-btn {
            background: #800000;
            border: 1px solid #800000;
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .edit-btn:hover {
            background: #600000;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap; 
            gap: 25px;
            margin-bottom: 25px;
            width: 100%;
        }

        .form-group {
            flex: 1 1 calc(50% - 25px); 
            display: flex;
            flex-direction: column;
            min-width: 250px; 
        }

        .form-group input {
            height: 45px; 
            padding: 0 15px; 
            border: 1px solid #FFDADA;
            border-radius: 8px;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box; 
        }

        .form-group label {
            margin-bottom: 8px;
            font-weight: 600;
            color: #800000;
            text-align: left;
        }

        .form-group input, .form-group textarea {
            padding: 12px;
            border: 1px solid #FFDADA; 
            border-radius: 8px;
            background-color: #FDFDFD;
            color: #333;
            font-size: 15px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #800000;
        }

        .full-width {
            width: 100%;
        }

        textarea {
            resize: none;
            height: 80px;
        }

        .save-btn {
            background: #800000;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        .cancel-btn {
            background: #f8f9fa;
            color: #666;
            border: 1px solid #ddd;
            padding: 8px 20px;
            border-radius: 8px;
            margin-right: 10px;
            font-weight: 600;
            cursor: pointer;
        }

        .save-btn:hover { background: #600000; }
        .cancel-btn:hover { background: #eee; }

        .editable-input {
            border-color: #800000 !important;
            background-color: white !important;
        }

        #actionButtons {
            min-height: 40px; 
            display: flex;
            align-items: center;
        }

        .back-link {
            color: #800000;
            font-size: 20px; 
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: 0.2s;
        }


        .back-link:hover {
            color: #600000; 
            transform: translateX(-3px);
        }

        .info-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

    </style>
    
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 p-0 text-white min-vh-100 shadow d-flex flex-column justify-content-between" style="background-color: #4A0E0E; position: fixed;">
            <div>
                <div class="p-4 text-center">
                    <h4 class="fw-bold m-0">LOGO</h4>
                    <small style="color: #E5A832; letter-spacing: 2px; font-weight: bold;">HandyFix</small>
                </div>

                <ul class="nav flex-column mt-4 ps-3">
                    <li class="nav-item mb-2">
                        <a href="home.html" id="dashboardLink" class="nav-link text-white opacity-75 fw-bold">
                            <i class="bi bi-house-door-fill me-2"></i>Home</a>
                    </li>

                    <li class="nav-item mb-2">
                        <a class="nav-link text-white opacity-75 fw-bold d-flex align-items-center" 
                        id="servicesToggle"
                        data-bs-toggle="collapse" 
                        href="#servicesSubmenu" 
                        role="button">
                            <i class="bi bi-list-ul me-2"></i> 
                            <span>Services</span>
                        </a>
                        
                        <div class="collapse" id="servicesSubmenu">
                        <ul class="nav flex-column ms-4 mt-2 mb-2 border-start border-secondary">
                                <li class="nav-item">
                                    <a href="plumbing.html" class="nav-link text-white opacity-75 py-1 small">
                                        <i class="bi bi-droplet-fill me-2"></i> Plumbing Services</a>
                                </li>
                                <li class="nav-item">
                                    <a href="maintenance.html" class="nav-link text-white opacity-75 py-1 small">
                                        <i class="bi bi-house-check-fill me-2"></i>Home Maintenance</a>
                                </li>
                                <li class="nav-item">
                                    <a href="electrical.html" class="nav-link text-white opacity-75 py-1 small">
                                        <i class="bi bi-lightning-charge-fill me-2"></i>Electrical Services</a>
                                </li>
                                <li class="nav-item">
                                    <a href="carpentry.html" class="nav-link text-white opacity-75 py-1 small">
                                        <i class="bi bi-tools me-2"></i>Carpentry Services</a>
                                <li class="nav-item">
                                    <a href="tool.html" class="nav-link text-white opacity-75 py-1 small">
                                        <i class="bi bi-briefcase-fill me-2"></i>Tool Services</a>                                
                                </li>
                            </ul>
                        </li>
                    </li>
                    <li class="nav-item mb-2">
                        <a href="bookings.html" class="nav-link text-white opacity-75 fw-bold"><i class="bi bi-calendar-check me-2"></i> My Bookings</a>
                    </li>
                    <li class="nav-item mb-2">
                        <a href="messages.html" class="nav-link text-white opacity-75 fw-bold"><i class="bi bi-chat-dots me-2"></i> Messages</a>
                    </li>
                    <li class="nav-item mb-2">
                        <a href="profile.html" class="nav-link active-link text-white opacity-75 fw-bold"><i class="bi bi-person-circle me-2"></i> Profile</a>
                    </li>
                    <li class="nav-item mb-2">
                        <a href="support.html" class="nav-link text-white opacity-75 fw-bold"><i class="bi bi-question-circle me-2"></i> Help & Support</a>
                    </li>
                    <li class="nav-item mb-2">
                        <a href="settings.html" class="nav-link text-white opacity-75 fw-bold small"><i class="bi bi-gear me-2"></i> Settings</a>
                    </li>
                    <li class="nav-item">
                        <a href="login.html" class="nav-link text-white opacity-75 fw-bold small"><i class="bi bi-box-arrow-right me-2"></i> Logout</a>
                    </li>
                </ul>
            </div>
        </nav>

        
<main class="content-area">
    <div class="personal-info-container">


<div class="info-header">
    <div class="d-flex align-items-center">
        <a href="profile.html" class="back-link">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h3 class="ms-3 mb-0">Personal Information</h3>
    </div>

        <div id="actionButtons">
            <button type="button" class="edit-btn" id="editBtn">Edit Details</button>
            <div id="saveCancelGroup" style="display: none;">
                <button type="button" class="cancel-btn" id="cancelBtn">Cancel</button>
                <button type="submit" class="save-btn" id="saveBtn" form="personalForm">Save Changes</button>
            </div>
        </div>
    </div>
    
    <form class="info-form" id="personalForm">
        <div class="form-row">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" value="Maria Santos" readonly>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" value="maria.santos@email.com" readonly>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" value="+63 912 345 6789" readonly>
            </div>
            <div class="form-group">
                <label>Birthdate</label>
                <input type="date" value="1995-05-15" readonly>
            </div>
        </div>

        <div class="form-group full-width">
            <label>Home Address</label>
            <textarea readonly>123 Handy Street, Quezon City, Philippines</textarea>
        </div>
    </form>
</div>

</main>


        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

    const servicesToggle = document.getElementById('servicesToggle');
    const dashboardLink = document.getElementById('dashboardLink');

    servicesToggle.addEventListener('click', function() {
        dashboardLink.classList.remove('active-link');
        dashboardLink.classList.add('opacity-75');
        this.classList.add('clicked-service');
        this.classList.remove('opacity-75');
    });

    const editBtn = document.getElementById('editBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const saveCancelGroup = document.getElementById('saveCancelGroup');
    const form = document.getElementById('personalForm');

    editBtn.addEventListener('click', () => {
        editBtn.style.display = 'none'; 
        saveCancelGroup.style.display = 'inline-block'; 
        
        const inputs = form.querySelectorAll('input, textarea');
        inputs.forEach(input => {
            input.removeAttribute('readonly'); 
            input.classList.add('editable-input'); 
        });
    });

    cancelBtn.addEventListener('click', () => {
        if(confirm("Discard changes?")) {
            location.reload(); 
        }
    });

form.addEventListener('submit', (e) => {
    e.preventDefault();

    const inputs = form.querySelectorAll('input, textarea');

    inputs.forEach(input => {
        input.setAttribute('readonly', true);
        input.classList.remove('editable-input');
    });

    saveCancelGroup.style.display = 'none';
    editBtn.style.display = 'block';

    inputs.forEach(input => {
        localStorage.setItem('saved_' + input.previousElementSibling.innerText, input.value);
    });

    alert("Changes saved successfully!");
});

</script>

</body>
</html>
