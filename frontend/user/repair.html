<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HandyFix | Plumbing Services</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/user/style.css" />
</head>

<body>

    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 p-0 text-white min-vh-100 shadow d-flex flex-column justify-content-between"
                style="background-color: #4A0E0E; position: fixed;">
                <div>
                    <div class="p-4 text-center">
                        <h4 class="fw-bold m-0">LOGO</h4>
                        <small style="color: #E5A832; letter-spacing: 2px; font-weight: bold;">HandyFix</small>
                    </div>

                    <ul class="nav flex-column mt-4 ps-3">
                        <li class="nav-item mb-2">
                            <a href="home.html" id="dashboardLink" class="nav-link text-white fw-bold active-link">
                                <i class="bi bi-house-door-fill me-2"></i>Home</a>
                        </li>

                        <li class="nav-item mb-2">
                            <a class="nav-link text-white opacity-75 fw-bold d-flex align-items-center"
                                id="servicesToggle" data-bs-toggle="collapse" href="#servicesSubmenu" role="button">
                                <i class="bi bi-list-ul me-2"></i>
                                <span>Services</span>
                            </a>

                            <div class="collapse" id="servicesSubmenu">
                                <ul class="nav flex-column ms-4 mt-2 mb-2 border-start border-secondary">
                                    <li class="nav-item">
                                        <a name="plumbing" onclick="repairNav(this)"
                                            class="nav-link text-white opacity-75 py-1 small">
                                            <i class="bi bi-droplet-fill me-2"></i> Plumbing Services</a>
                                    </li>
                                    <li class="nav-item">
                                        <a name="maintenance" onclick="repairNav(this)"
                                            class="nav-link text-white opacity-75 py-1 small">
                                            <i class="bi bi-house-check-fill me-2"></i>Home Maintenance</a>
                                    </li>
                                    <li class="nav-item">
                                        <a name="electrical" onclick="repairNav(this)"
                                            class="nav-link text-white opacity-75 py-1 small">
                                            <i class="bi bi-lightning-charge-fill me-2"></i>Electrical Services</a>
                                    </li>
                                    <li class="nav-item">
                                        <a name="carpentry" onclick="repairNav(this)"
                                            class="nav-link text-white opacity-75 py-1 small">
                                            <i class="bi bi-tools me-2"></i>Carpentry Services</a>
                                    <li class="nav-item">
                                        <a name="tool" onclick="repairNav(this)"
                                            class="nav-link text-white opacity-75 py-1 small">
                                            <i class="bi bi-briefcase-fill me-2"></i>Tool Services</a>
                                    </li>
                                </ul>
                        </li>
                        </li>
                        <li class="nav-item mb-2">
                            <a href="/user/booking" class="nav-link text-white opacity-75 fw-bold"><i
                                    class="bi bi-calendar-check me-2"></i> My Bookings</a>
                        </li>
                        <li class="nav-item mb-2">
                            <a href="/user/messages" class="nav-link text-white opacity-75 fw-bold"><i
                                    class="bi bi-chat-dots me-2"></i> Messages</a>
                        </li>
                        <li class="nav-item mb-2">
                            <a href="/user/profile" class="nav-link text-white opacity-75 fw-bold"><i
                                    class="bi bi-person-circle me-2"></i> Profile</a>
                        </li>
                        <li class="nav-item mb-2">
                            <a href="/user/support" class="nav-link text-white opacity-75 fw-bold"><i
                                    class="bi bi-question-circle me-2"></i> Help & Support</a>
                        </li>
                        <li class="nav-item mb-2">
                            <a href="/user/settings" class="nav-link text-white opacity-75 fw-bold small"><i
                                    class="bi bi-gear me-2"></i> Settings</a>
                        </li>
                        <li class="nav-item">
                            <a href="/login" class="nav-link text-white opacity-75 fw-bold small"><i
                                    class="bi bi-box-arrow-right me-2"></i> Logout</a>
                        </li>
                    </ul>
                </div>
            </nav>



            <main class="col-md-10 offset-md-2 bg-light p-5 min-vh-100">
                <div class="d-flex align-items-center mb-4">
                    <a href="home.html" class="btn btn-outline-dark border-0 me-3">
                        <i class="bi bi-arrow-left fs-4"></i>
                    </a>
                    <h2 class="fw-bold m-0" style="color: #4A0E0E;" id="servicesTitle">Services</h2>
                </div>

                <div class="row g-4" id="servicesContainer">
                    <!-- Services will be loaded here -->
                </div>
            </main>


            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

            <script>
                

                const params = new URLSearchParams(window.location.search);
const paramRepair = params.get('repair');

async function fetchData(paramRepair) {
    try {
        const response = await fetch(`/api/repairsList/${paramRepair}`);
        if (!response.ok) throw new Error('Failed to load requests');
        const tickets = await response.json();
        return tickets;
    } catch (error) {
        console.error(error);
    }
    return [];
}

function renderServices(services) {
    const container = document.getElementById('servicesContainer');
    if (!services || services.length === 0) {
        container.innerHTML = `
            <div class="col-12 text-center py-5">
                <p class="text-muted">No services available.</p>
            </div>`;
        return;
    }

    const title = document.getElementById('servicesTitle');
    if (title) {
        title.textContent = services[0]?.sub_service || 'Services';
    }


    container.innerHTML = services.map(service => `
        <div class="col-md-6">
            <div class="card border-0 shadow-sm p-4 h-100 rounded-4">
                <div class="d-flex align-items-start gap-4">
                    <div class="bg-light p-3 rounded-4" style="min-width: 80px; text-align: center;">
                        <i class="bi ${service.icon} fs-1"></i>
                    </div>
                    <div class="flex-grow-1">
                        <h5 class="fw-bold mb-2">${service.sub_service}</h5>
                        <p class="text-muted small mb-3">${service.description}</p>
                        <div class="d-flex justify-content-between align-items-center">
                            <h6 class="fw-bold m-0">Estimated: ₱${service.price_low.toLocaleString()} - ₱${service.price_high.toLocaleString()}</h6>
                            <a href="/user/booking?service=${encodeURIComponent(service.service)}&sub=${encodeURIComponent(service.sub_service)}&id=${service.id}" 
                               class="btn px-4 text-white fw-bold rounded-pill" 
                               style="background-color: #E5A832;">BOOK NOW</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    `).join('');
}

async function init() {
    const services = await fetchData(paramRepair);
    renderServices(services);
}

init();

                const dashboardLink = document.getElementById('dashboardLink');

                servicesToggle.addEventListener('click', function () {
                    dashboardLink.classList.remove('active-link');
                    dashboardLink.classList.add('opacity-75');

                    this.classList.add('clicked-service');
                    this.classList.remove('opacity-75');
                });

                function repairNav(data) {
                    window.location.href = `/user/repairs?repair=${data.name}`;
                }

                // Load services on page load
                renderServices();
            </script>

</body>

</html>
