<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HandyFix | Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/user/style.css"/>
    
</head>
<body>

<div class="container-fluid">
    <div class="row">
                    <script src="shared-nav.js"></script>
<main class="col-md-10 ms-auto p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-4" style="color: #4A0E0E;">Messages</h2>
    </div>


        <div class="container-fluid vh-100 bg-white p-0">
            
    <div class="row g-0 h-100">

<div class="col-md-4 col-lg-3 border-end d-flex flex-column bg-white p-0">
    
    <div class="search-header-area border-bottom">
        <div class="search-container position-relative">
            <i class="bi bi-search search-icon-maroon"></i>                    
            <input type="text" id="techSearch" class="form-control search-input shadow-none" 
                   placeholder="Search technician..." onkeyup="filterTechnicians()">
        </div>
    </div>
    
    <div class="flex-grow-1 overflow-auto px-2 mt-2" id="technicianList">
    </div>
</div>




<div class="col-md-8 col-lg-9 d-flex flex-column" style="background-color: #fdfdfd; height: calc(100vh - 80px);">    
    <div class="p-3 border-bottom bg-white d-flex align-items-center">
                <div id="chat-avatar" class="avatar-small">JD</div>
                <div class="ms-3">
                    <h6 id="chat-name" class="mb-0 fw-bold">John Doe</h6>
                    <small id="chat-status" class="text-muted">Plumbing Expert</small>
                </div>
            </div>

            

            <div class="flex-grow-1 p4 overflow-auto d-flex flex-column" id="chat-messages">
            </div>

            <div class="p-3 bg-transparent border-top">
                <div class="p-0 bg-transparent border-0 d-flex align-items-center justify-content-center" style="gap: 10px; width: 100%; margin-bottom: 20px; padding: 0 15px;">                
                    <div class="input-wrapper flex-grow-1" style="max-width: 900px;">
                    <input type="text" 
                            id="messageInput" 
                            class="form-control border-0 shadow-none px-4 bg-transparent" 
                            placeholder="Type a message..."
                            oninput="updatePreview(this.value)">
                </div>

                    <button id="sendBtn" class="btn-send-rectangular">Send</button>
                </div>

                
            </div>
        </div>
    </div>
</div>
</div>

</main>



        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

// ─── State ────────────────────────────────────────────────────────────────────

/**
 * Holds all fetched messages keyed by ticket_id.
 * conversations[ticketId] = [ { type: 'sent'|'received', text: '...' }, ... ]
 */
let conversations = {};

/**
 * Holds technician metadata keyed by ticket_id.
 * ticketMeta[ticketId] = { name, initials, bgColor, status, preview }
 * 
 * NOTE: The API currently doesn't return technician names/avatars, so we fall
 * back to placeholder values. Replace the `resolveTechMeta` function below
 * when your API exposes that data.
 */
let ticketMeta = {};

/** The ticket_id of the currently open chat. */
let activeTicketId = null;


// ─── API ──────────────────────────────────────────────────────────────────────

async function fetchMessages() {
    try {
        const response = await fetch('/api/fetchMessages');
        if (!response.ok) throw new Error('Network response was not ok');
        return await response.json();
    } catch (error) {
        console.error('Error fetching messages:', error);
        return [];
    }
}


// ─── Data helpers ─────────────────────────────────────────────────────────────

/**
 * Returns display metadata for a ticket.
 * Extend this when your API returns contractor names/avatars per ticket.
 */
function resolveTechMeta(ticketId, index) {
    // Palette for avatar backgrounds when no colour is specified
    const palette = ['#2c3e50', '#16a085', '#8e44ad', '#c0392b', '#d35400'];

    return ticketMeta[ticketId] || {
        name: `Ticket #${ticketId}`,
        initials: `T${ticketId}`,
        bgColor: palette[index % palette.length],
        status: 'Active Now',
        preview: ''
    };
}

/**
 * Builds `conversations` and `ticketMeta` from the raw API array.
 * A message is "sent" (by the logged-in customer) when user_id is not null;
 * "received" when contractor_id is not null.
 */
function processMessages(messages) {
    conversations = {};
    // Track insertion order of ticket IDs
    const ticketOrder = [];

    messages.forEach(msg => {
        const tid = msg.ticket_id;

        if (!conversations[tid]) {
            conversations[tid] = [];
            ticketOrder.push(tid);
        }

        const type = msg.user_id !== null ? 'sent' : 'received';
        conversations[tid].push({ type, text: msg.message });
    });

    // Build ticketMeta with a preview (last message in the ticket)
    ticketOrder.forEach((tid, index) => {
        const msgs = conversations[tid];
        const lastMsg = msgs[msgs.length - 1];
        const existing = ticketMeta[tid] || {};

        ticketMeta[tid] = {
            ...resolveTechMeta(tid, index),
            ...existing,
            preview: lastMsg ? lastMsg.text.substring(0, 40) + (lastMsg.text.length > 40 ? '…' : '') : ''
        };
    });

    return ticketOrder;
}


// ─── Rendering ────────────────────────────────────────────────────────────────

function renderTechniciansList(ticketOrder) {
    const list = document.getElementById('technicianList');
    list.innerHTML = '';

    ticketOrder.forEach((tid, index) => {
        const meta = ticketMeta[tid];

        const card = document.createElement('div');
        card.className = `tech-card d-flex align-items-center p-3 mb-2 ${index === 0 ? 'active-chat' : ''}`;
        card.setAttribute('data-ticket', tid);
        card.onclick = () => openChat(tid);

        const avatar = document.createElement('div');
        avatar.className = 'avatar-circle';
        avatar.style.height = '25px';
        avatar.style.width = '25px';    
        if (meta.bgColor) avatar.style.backgroundColor = meta.bgColor;
        avatar.innerText = meta.initials;

        const content = document.createElement('div');
        content.className = 'ms-1 flex-grow-1 overflow-hidden';

        const name = document.createElement('h6');
        name.className = 'mb-0 fw-bold';
        name.innerText = meta.name;

        const preview = document.createElement('small');
        preview.className = 'text-muted text-truncate d-block';
        preview.id = `preview-${tid}`;
        preview.innerText = meta.preview;

        content.appendChild(name);
        content.appendChild(preview);
        card.appendChild(avatar);
        card.appendChild(content);
        list.appendChild(card);
    });
}

function openChat(ticketId) {
    activeTicketId = ticketId;
    const meta = ticketMeta[ticketId];

    // Update header
    document.getElementById('chat-name').innerText = meta.name;
    document.getElementById('chat-avatar').innerText = meta.initials;

    const statusEl = document.getElementById('chat-status');
    if (meta.status === 'Active Now') {
        statusEl.innerHTML = `<span class="status-dot"></span>Active Now`;
    } else {
        statusEl.innerText = meta.status;
    }

    // Render messages
    const chatWindow = document.getElementById('chat-messages');
    chatWindow.innerHTML = '';

    (conversations[ticketId] || []).forEach(msg => {
        const wrapper = document.createElement('div');
        wrapper.className = `message-wrapper ${msg.type}`;

        const label = document.createElement('div');
        label.className = 'chat-label';
        label.innerText = msg.type === 'sent' ? 'Customer' : 'Technician';

        const bubble = document.createElement('div');
        bubble.className = `chat-bubble-box ${msg.type}`;
        bubble.innerText = msg.text;

        wrapper.appendChild(label);
        wrapper.appendChild(bubble);
        chatWindow.appendChild(wrapper);
    });

    // Highlight active card
    document.querySelectorAll('.tech-card').forEach(card => {
        card.classList.toggle('active-chat', card.getAttribute('data-ticket') == ticketId);
    });

    chatWindow.scrollTop = chatWindow.scrollHeight;
}


// ─── Send message ─────────────────────────────────────────────────────────────

function sendMessage() {
    const input = document.getElementById('messageInput');
    const text = input.value.trim();
    if (!text || activeTicketId === null) return;

    // Optimistically add to local state
    if (!conversations[activeTicketId]) conversations[activeTicketId] = [];
    conversations[activeTicketId].push({ type: 'sent', text });

    // Update preview in sidebar
    const previewEl = document.getElementById(`preview-${activeTicketId}`);
    if (previewEl) {
        previewEl.innerText = text.substring(0, 40) + (text.length > 40 ? '…' : '');
        previewEl.style.color = '#800000';
    }

    openChat(activeTicketId);
    input.value = '';

    // TODO: POST the new message to your API
    // fetch('/api/sendMessageUser',   const { ticket_id, content } = req.body; });
    fetch('/api/sendMessageUser', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ticket_id: activeTicketId, content: text })
    });
}


// ─── Search / filter ──────────────────────────────────────────────────────────

function updatePreview(val) {
    if (activeTicketId === null) return;
    const previewEl = document.getElementById(`preview-${activeTicketId}`);
    if (!previewEl) return;

    if (val.trim() === '') {
        const msgs = conversations[activeTicketId] || [];
        const last = msgs[msgs.length - 1];
        previewEl.innerText = last ? last.text.substring(0, 40) : '';
        previewEl.style.color = '#6c757d';
    } else {
        previewEl.innerText = val;
        previewEl.style.color = '#800000';
    }
}

function filterTechnicians() {
    const query = document.getElementById('techSearch').value.toLowerCase();
    document.querySelectorAll('.tech-card').forEach(card => {
        const name = card.querySelector('h6').innerText.toLowerCase();
        card.style.setProperty('display', name.startsWith(query) ? 'flex' : 'none', 'important');
    });
}


// ─── Nav helpers ──────────────────────────────────────────────────────────────

function repairNav(el) {
    window.location.href = `/user/repairs?repair=${el.name}`;
}

const servicesToggle = document.getElementById('servicesToggle');
const dashboardLink  = document.getElementById('dashboardLink');

servicesToggle.addEventListener('click', function () {
    dashboardLink.classList.remove('active-link');
    dashboardLink.classList.add('opacity-75');
    this.classList.add('clicked-service');
    this.classList.remove('opacity-75');
});

document.getElementById('sendBtn').addEventListener('click', sendMessage);
document.getElementById('messageInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') sendMessage();
});


// ─── Boot ─────────────────────────────────────────────────────────────────────

window.onload = async () => {
    const rawMessages = await fetchMessages();
    const ticketOrder = processMessages(rawMessages);
    renderTechniciansList(ticketOrder);

    if (ticketOrder.length > 0) {
        openChat(ticketOrder[0]);
    }
};

</script>

</body>
</html>
