<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HandyFix | Leak Repair</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">

    <style>
        .back-btn-circle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            transition: background-color 0.3s ease;
            color: #4A0E0E;
            text-decoration: none;
        }

        .back-btn-circle:hover {
            background-color: rgba(0, 0, 0, 0.08); /* Light gray circle on hover */
            color: #4A0E0E;
        }
        
        .border-dashed { border-style: dashed; }

        .form-control:focus, .form-select:focus {
            border-color: #E5A832;
            box-shadow: 0 0 0 0.25rem rgba(229, 168, 50, 0.25);
        }

        .summary-label { color: #6c757d; font-size: 0.85rem; font-weight: bold; }
        .summary-value { color: #4A0E0E; font-weight: 600; }

    </style>
</head>
<body>

    <div class="container-fluid">
    <div class="row">
        <script src="shared-nav.js"></script>



            <main class="col-md-10 offset-md-2 p-5">
                <div class="d-flex align-items-center mb-4">
                    <a href="plumbing.html" class="back-btn-circle me-2">
                        <i class="bi bi-arrow-left fs-2"></i>
                    </a>
                    <div class="d-flex flex-column">
                        <h2 class="fw-bold m-0" style="color: #4A0E0E; line-height: 1;">Plumbing Services</h2>
                    </div>
                </div>

                <div class="card shadow-sm border-0">
                    <div class="card-body p-5">
                        <h3 class="fw-bold mb-4" style="color: #4A0E0E;">Leak Repair</h3>
                        
                        <div class="progress mb-5" style="height: 5px;">
                            <div class="progress-bar" id="pBar" role="progressbar" style="width: 33%; background-color: #E5A832;"></div>
                        </div>

                        <div id="bookingFormMount" data-service-name="Leak Repair" data-genre="Plumbing" data-issue-options='["Leak inspection and detection", "Pipe or faucet repair", "Replacement of minor damaged parts", "System pressure testing", "Others (Please specify in details below)"]'></div>

                    </div> 
                </div> 
                </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="/user/js/serviceBookingFlow.js"></script>
</body>
</html>
