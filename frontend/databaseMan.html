<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DB Studio</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg0: #0d0f12;
    --bg1: #13161b;
    --bg2: #1a1e25;
    --bg3: #222730;
    --bg4: #2a303c;
    --line: #2e3440;
    --text0: #e8eaf0;
    --text1: #9ba3b5;
    --text2: #5c6478;
    --green: #3ddc84;
    --green-dim: #1e4a35;
    --amber: #ffb347;
    --amber-dim: #4a3510;
    --blue: #58a6ff;
    --blue-dim: #0d2a4a;
    --red: #ff6b6b;
    --red-dim: #4a1515;
    --purple: #c792ea;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg0);
    color: var(--text0);
    font-family: var(--mono);
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TITLEBAR ── */
  #titlebar {
    background: var(--bg1);
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 16px;
    height: 44px;
    flex-shrink: 0;
  }
  #titlebar .logo {
    font-family: var(--sans);
    font-weight: 800;
    font-size: 16px;
    color: var(--green);
    letter-spacing: -0.5px;
  }
  #titlebar .logo span { color: var(--text2); }
  #titlebar .sep { width: 1px; height: 20px; background: var(--line); margin: 0 4px; }
  #titlebar .conn-badge {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg3); border: 1px solid var(--line);
    border-radius: 4px; padding: 3px 10px;
    font-size: 11px; color: var(--text1);
  }
  #titlebar .conn-badge .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  #titlebar .spacer { flex: 1; }
  #titlebar .status-txt { font-size: 11px; color: var(--text2); }

  /* ── MAIN LAYOUT ── */
  #layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    grid-template-rows: 1fr;
    flex: 1;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    background: var(--bg1);
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #sidebar-header {
    padding: 10px 12px 8px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between;
  }
  #sidebar-header .label {
    font-size: 10px; font-weight: 600; letter-spacing: 1.2px;
    text-transform: uppercase; color: var(--text2);
  }
  #refresh-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text2); font-size: 13px; padding: 2px 4px;
    border-radius: 3px; transition: color .15s, background .15s;
    font-family: var(--mono);
  }
  #refresh-btn:hover { color: var(--green); background: var(--bg3); }

  #table-search {
    background: var(--bg2); border: none; border-bottom: 1px solid var(--line);
    color: var(--text0); font-family: var(--mono); font-size: 12px;
    padding: 8px 12px; width: 100%; outline: none;
  }
  #table-search::placeholder { color: var(--text2); }
  #table-search:focus { background: var(--bg3); }

  #table-list { flex: 1; overflow-y: auto; padding: 4px 0; }
  #table-list::-webkit-scrollbar { width: 4px; }
  #table-list::-webkit-scrollbar-track { background: transparent; }
  #table-list::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }

  .table-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 12px; cursor: pointer;
    border-left: 2px solid transparent;
    transition: all .12s; user-select: none;
  }
  .table-item:hover { background: var(--bg2); color: var(--text0); }
  .table-item.active {
    background: var(--bg3); border-left-color: var(--green);
    color: var(--green);
  }
  .table-item .tbl-icon { color: var(--text2); font-size: 11px; }
  .table-item.active .tbl-icon { color: var(--green); }
  .table-item .tbl-name { flex: 1; font-size: 12px; }
  .table-item .tbl-count {
    font-size: 10px; color: var(--text2);
    background: var(--bg4); padding: 1px 5px; border-radius: 2px;
  }
  .table-item.active .tbl-count { background: var(--green-dim); color: var(--green); }

  #sidebar-footer {
    border-top: 1px solid var(--line);
    padding: 8px 12px;
    font-size: 10px; color: var(--text2);
    display: flex; justify-content: space-between;
  }

  /* ── RIGHT PANEL ── */
  #right-panel {
    display: flex; flex-direction: column; overflow: hidden;
    background: var(--bg0);
  }

  /* ── TABS ── */
  #tabs {
    display: flex; align-items: stretch;
    background: var(--bg1); border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .tab-btn {
    background: none; border: none; border-bottom: 2px solid transparent;
    color: var(--text2); font-family: var(--mono); font-size: 12px;
    padding: 10px 18px; cursor: pointer; transition: all .15s;
    display: flex; align-items: center; gap: 6px;
    white-space: nowrap;
  }
  .tab-btn:hover { color: var(--text0); background: var(--bg2); }
  .tab-btn.active { color: var(--green); border-bottom-color: var(--green); background: var(--bg0); }
  .tab-btn .tab-icon { font-size: 14px; }
  #tabs .spacer { flex: 1; }

  /* ── TAB PANELS ── */
  .tab-panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  .tab-panel.active { display: flex; }

  /* ── DATA GRID ── */
  #grid-controls {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px; border-bottom: 1px solid var(--line);
    background: var(--bg1); flex-shrink: 0;
  }
  #grid-controls .tbl-title {
    font-family: var(--sans); font-weight: 700; font-size: 14px; color: var(--text0);
  }
  #grid-controls .tbl-title span { color: var(--text2); font-weight: 400; font-size: 12px; font-family: var(--mono); }
  #grid-controls .spacer { flex: 1; }
  #row-filter {
    background: var(--bg2); border: 1px solid var(--line); border-radius: 4px;
    color: var(--text0); font-family: var(--mono); font-size: 12px;
    padding: 4px 10px; outline: none; width: 160px; transition: border-color .15s;
  }
  #row-filter:focus { border-color: var(--green); }
  #row-filter::placeholder { color: var(--text2); }
  .ctrl-btn {
    background: var(--bg3); border: 1px solid var(--line); border-radius: 4px;
    color: var(--text1); font-family: var(--mono); font-size: 11px;
    padding: 4px 10px; cursor: pointer; transition: all .15s;
  }
  .ctrl-btn:hover { background: var(--bg4); color: var(--text0); border-color: var(--text2); }
  .ctrl-btn.primary { border-color: var(--green-dim); color: var(--green); }
  .ctrl-btn.primary:hover { background: var(--green-dim); }

  #grid-wrap { flex: 1; overflow: auto; }
  #grid-wrap::-webkit-scrollbar { width: 6px; height: 6px; }
  #grid-wrap::-webkit-scrollbar-track { background: var(--bg1); }
  #grid-wrap::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

  #data-table {
    width: 100%; border-collapse: collapse;
    font-size: 12px;
  }
  #data-table thead th {
    background: var(--bg2); color: var(--text1);
    font-size: 10px; font-weight: 600; letter-spacing: .8px;
    text-transform: uppercase; text-align: left;
    padding: 8px 12px; position: sticky; top: 0; z-index: 2;
    border-bottom: 1px solid var(--line);
    white-space: nowrap; cursor: pointer; user-select: none;
  }
  #data-table thead th:hover { color: var(--text0); background: var(--bg3); }
  #data-table thead th .sort-indicator { color: var(--green); margin-left: 4px; }
  #data-table tbody tr {
    border-bottom: 1px solid #1a1e25;
    transition: background .1s;
  }
  #data-table tbody tr:hover { background: var(--bg2); }
  #data-table tbody tr.selected { background: var(--blue-dim) !important; }
  #data-table tbody td {
    padding: 7px 12px; color: var(--text0);
    max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  #data-table tbody td.null-val { color: var(--text2); font-style: italic; }
  #data-table tbody td.num-val { color: var(--amber); }
  #data-table tbody td.bool-val { color: var(--purple); }
  #data-table tbody td.pk-val { color: var(--blue); }
  #data-table .row-num {
    color: var(--text2); font-size: 11px; text-align: right;
    padding-right: 14px; min-width: 40px; user-select: none;
  }

  /* ── PAGINATION ── */
  #pagination {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px; border-top: 1px solid var(--line);
    background: var(--bg1); flex-shrink: 0;
    font-size: 11px; color: var(--text2);
  }
  #pagination .spacer { flex: 1; }
  .page-btn {
    background: var(--bg3); border: 1px solid var(--line); border-radius: 3px;
    color: var(--text1); font-family: var(--mono); font-size: 11px;
    padding: 3px 8px; cursor: pointer; transition: all .12s;
    min-width: 28px; text-align: center;
  }
  .page-btn:hover:not(:disabled) { background: var(--bg4); color: var(--text0); }
  .page-btn.current { background: var(--green-dim); border-color: var(--green); color: var(--green); }
  .page-btn:disabled { opacity: .35; cursor: default; }
  #page-size-select {
    background: var(--bg3); border: 1px solid var(--line); border-radius: 3px;
    color: var(--text1); font-family: var(--mono); font-size: 11px; padding: 3px 6px;
  }

  /* ── SQL EDITOR ── */
  #query-panel {
    display: flex; flex-direction: column; height: 100%; overflow: hidden;
  }
  #editor-wrap {
    flex-shrink: 0; position: relative;
    border-bottom: 1px solid var(--line);
  }
  #sql-editor {
    width: 100%; background: var(--bg1);
    border: none; outline: none; resize: none;
    color: var(--text0); font-family: var(--mono); font-size: 13px;
    line-height: 1.65; padding: 16px 16px 16px 52px;
    height: 200px; tab-size: 2;
  }
  #sql-editor::placeholder { color: var(--text2); }
  #sql-editor::-webkit-scrollbar { width: 4px; }
  #sql-editor::-webkit-scrollbar-thumb { background: var(--bg4); }
  /* line numbers */
  #line-nums {
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 42px; background: var(--bg2);
    border-right: 1px solid var(--line);
    padding: 16px 8px; text-align: right;
    font-family: var(--mono); font-size: 13px; line-height: 1.65;
    color: var(--text2); pointer-events: none; overflow: hidden;
    user-select: none;
  }
  #editor-toolbar {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px; background: var(--bg2);
    border-bottom: 1px solid var(--line); flex-shrink: 0;
  }
  #editor-toolbar .spacer { flex: 1; }
  #run-btn {
    background: var(--green); color: var(--bg0);
    border: none; border-radius: 4px;
    font-family: var(--mono); font-size: 12px; font-weight: 700;
    padding: 6px 16px; cursor: pointer; transition: all .15s;
    display: flex; align-items: center; gap: 6px;
  }
  #run-btn:hover { background: #5aeea0; }
  #run-btn:active { transform: scale(.97); }
  #run-btn.loading { opacity: .6; cursor: wait; }
  .kbd {
    background: var(--bg4); border: 1px solid var(--line); border-radius: 3px;
    font-size: 10px; color: var(--text2); padding: 2px 5px;
  }
  .editor-hint { font-size: 11px; color: var(--text2); }

  #query-result-wrap { flex: 1; overflow: auto; position: relative; }
  #query-result-wrap::-webkit-scrollbar { width: 6px; height: 6px; }
  #query-result-wrap::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

  /* Result status bar */
  #result-status {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 14px; background: var(--bg2);
    border-bottom: 1px solid var(--line);
    font-size: 11px; flex-shrink: 0;
  }
  .status-ok { color: var(--green); }
  .status-err { color: var(--red); }
  .status-info { color: var(--text2); }

  /* ── SCHEMA PANEL ── */
  #schema-panel {
    flex: 1; overflow-y: auto; padding: 16px;
  }
  #schema-panel::-webkit-scrollbar { width: 4px; }
  #schema-panel::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }

  .schema-table-block {
    border: 1px solid var(--line); border-radius: 6px;
    margin-bottom: 16px; overflow: hidden;
  }
  .schema-table-header {
    background: var(--bg2); padding: 9px 14px;
    display: flex; align-items: center; gap: 8px;
    cursor: pointer; user-select: none;
  }
  .schema-table-header .s-name {
    font-family: var(--sans); font-weight: 700; font-size: 13px; color: var(--text0); flex: 1;
  }
  .schema-table-header .s-count {
    font-size: 11px; color: var(--text2);
    background: var(--bg4); padding: 1px 6px; border-radius: 2px;
  }
  .schema-table-header .chevron { color: var(--text2); font-size: 11px; transition: transform .2s; }
  .schema-table-block.open .chevron { transform: rotate(90deg); }
  .schema-cols { display: none; }
  .schema-table-block.open .schema-cols { display: table; width: 100%; border-collapse: collapse; }
  .schema-col-row { border-top: 1px solid var(--line); }
  .schema-col-row:hover { background: var(--bg2); }
  .schema-col-row td { padding: 6px 14px; font-size: 12px; }
  .schema-col-row td:first-child { color: var(--blue); width: 180px; }
  .schema-col-row td:nth-child(2) { color: var(--amber); width: 120px; font-size: 11px; }
  .schema-col-row td:nth-child(3) { color: var(--text2); font-size: 11px; }
  .badge-pk {
    display: inline-block;
    background: var(--blue-dim); color: var(--blue);
    border: 1px solid #1e4a7a; border-radius: 3px;
    font-size: 9px; font-weight: 700; padding: 0 5px; letter-spacing: .5px;
    margin-left: 6px; vertical-align: middle;
  }
  .badge-nn {
    display: inline-block;
    background: var(--amber-dim); color: var(--amber);
    border: 1px solid #5a4010; border-radius: 3px;
    font-size: 9px; font-weight: 700; padding: 0 5px; letter-spacing: .5px;
    margin-left: 4px; vertical-align: middle;
  }

  /* ── EMPTY / LOADING STATES ── */
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; color: var(--text2); gap: 12px;
  }
  .empty-state .icon { font-size: 36px; }
  .empty-state .msg { font-size: 13px; }
  .empty-state .sub { font-size: 11px; color: var(--text2); opacity: .6; }

  .loader {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid var(--bg4); border-top-color: var(--green);
    border-radius: 50%; animation: spin .6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--bg3); border: 1px solid var(--line);
    border-radius: 6px; padding: 10px 16px;
    font-size: 12px; display: flex; align-items: center; gap: 8px;
    transform: translateY(60px); opacity: 0;
    transition: all .25s; z-index: 999; max-width: 320px;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.ok { border-left: 3px solid var(--green); }
  #toast.err { border-left: 3px solid var(--red); }
  #toast.info { border-left: 3px solid var(--blue); }

  /* Resize handle */
  #resize-handle {
    height: 4px; background: var(--line); cursor: row-resize;
    transition: background .15s; flex-shrink: 0;
  }
  #resize-handle:hover { background: var(--green); }

  select { color-scheme: dark; }
</style>
</head>
<body>

<!-- TITLEBAR -->
<div id="titlebar">
  <div class="logo">DB<span>Studio</span></div>
  <div class="sep"></div>
  <div class="conn-badge">
    <div class="dot"></div>
    <span id="conn-label">Connecting…</span>
  </div>
  <div class="spacer"></div>
  <span class="status-txt" id="header-status"></span>
</div>

<!-- LAYOUT -->
<div id="layout">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sidebar-header">
      <span class="label">Tables</span>
      <button id="refresh-btn" title="Refresh tables">↺</button>
    </div>
    <input id="table-search" type="text" placeholder="Filter tables…" autocomplete="off"/>
    <div id="table-list"><div class="empty-state" style="height:120px"><div class="loader"></div></div></div>
    <div id="sidebar-footer">
      <span id="table-count">0 tables</span>
      <span id="db-engine">—</span>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div id="right-panel">
    <div id="tabs">
      <button class="tab-btn active" data-tab="data"><span class="tab-icon">⊞</span> Data</button>
      <button class="tab-btn" data-tab="query"><span class="tab-icon">⌨</span> Query</button>
      <button class="tab-btn" data-tab="schema"><span class="tab-icon">◈</span> Schema</button>
      <div class="spacer"></div>
    </div>

    <!-- DATA TAB -->
    <div class="tab-panel active" id="tab-data">
      <div id="grid-controls">
        <div class="tbl-title" id="grid-title">Select a table <span>← from sidebar</span></div>
        <div class="spacer"></div>
        <input id="row-filter" type="text" placeholder="Filter rows…" autocomplete="off"/>
        <button class="ctrl-btn primary" id="load-more-btn" style="display:none">Load ↓</button>
        <button class="ctrl-btn" id="export-csv-btn">Export CSV</button>
      </div>
      <div id="grid-wrap">
        <div class="empty-state">
          <div class="icon">⊞</div>
          <div class="msg">No table selected</div>
          <div class="sub">Choose a table from the sidebar to view its data</div>
        </div>
      </div>
      <div id="pagination" style="display:none">
        <span id="pag-info">–</span>
        <div class="spacer"></div>
        <label style="color:var(--text2);font-size:11px">Rows:
          <select id="page-size-select" class="page-size-select">
            <option value="25">25</option>
            <option value="50" selected>50</option>
            <option value="100">100</option>
            <option value="250">250</option>
          </select>
        </label>
        <button class="page-btn" id="page-prev">‹</button>
        <span id="page-nums"></span>
        <button class="page-btn" id="page-next">›</button>
      </div>
    </div>

    <!-- QUERY TAB -->
    <div class="tab-panel" id="tab-query">
      <div id="query-panel">
        <div id="editor-wrap">
          <div id="line-nums" id="lnums"></div>
          <textarea id="sql-editor" placeholder="-- Write SQL here&#10;SELECT * FROM users LIMIT 100;" spellcheck="false"></textarea>
        </div>
        <div id="editor-toolbar">
          <span class="editor-hint">Ctrl+Enter to run</span>
          <span class="kbd">Ctrl</span><span style="color:var(--text2);font-size:11px">+</span><span class="kbd">Enter</span>
          <div class="spacer"></div>
          <button class="ctrl-btn" id="clear-editor-btn">Clear</button>
          <button id="run-btn">▶ Run Query</button>
        </div>
        <div id="result-status" style="display:none"></div>
        <div id="query-result-wrap" style="flex:1;overflow:auto">
          <div class="empty-state">
            <div class="icon">⌨</div>
            <div class="msg">No results yet</div>
            <div class="sub">Write a SQL query above and hit Run</div>
          </div>
        </div>
      </div>
    </div>

    <!-- SCHEMA TAB -->
    <div class="tab-panel" id="tab-schema">
      <div id="schema-panel">
        <div class="empty-state">
          <div class="loader"></div>
          <div class="msg">Loading schema…</div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
const API = '/api/databaseChecker';

// ── State ──────────────────────────────────────────────────────────────────
let allTables = [];
let currentTable = null;
let currentPage = 1;
let pageSize = 50;
let totalRows = 0;
let sortCol = null;
let sortDir = 'asc';
let filterVal = '';
let rowFilterTimer = null;

// ── Utils ──────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
let toastTimer;
function toast(msg, type = 'info') {
  const el = $('toast');
  el.className = `show ${type}`;
  el.textContent = msg;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 2800);
}

function renderTable(columns, rows) {
  if (!rows.length) return '<div class="empty-state" style="padding:40px 0"><div class="icon">∅</div><div class="msg">No rows returned</div></div>';
  let html = '<table id="data-table"><thead><tr><th class="row-num">#</th>';
  columns.forEach((c, i) => {
    const active = sortCol === c ? ` <span class="sort-indicator">${sortDir==='asc'?'▲':'▼'}</span>` : '';
    html += `<th data-col="${i}" data-name="${c}">${c}${active}</th>`;
  });
  html += '</tr></thead><tbody>';
  const offset = (currentPage - 1) * pageSize;
  rows.forEach((row, ri) => {
    html += `<tr>`;
    html += `<td class="row-num">${offset + ri + 1}</td>`;
    (Array.isArray(row) ? row : Object.values(row)).forEach((v, ci) => {
      if (v === null || v === undefined) {
        html += `<td class="null-val">NULL</td>`;
      } else if (typeof v === 'number') {
        html += `<td class="num-val">${v}</td>`;
      } else if (typeof v === 'boolean') {
        html += `<td class="bool-val">${v}</td>`;
      } else {
        const s = String(v);
        html += `<td title="${s.replace(/"/g,'&quot;')}">${s.length > 80 ? s.slice(0,80)+'…' : s}</td>`;
      }
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  return html;
}

// ── API calls ─────────────────────────────────────────────────────────────
async function apiFetch(path, opts = {}) {
  const r = await fetch(API + path, { headers: { 'Content-Type': 'application/json' }, ...opts });
  if (!r.ok) { const e = await r.json().catch(() => ({ error: r.statusText })); throw new Error(e.error || r.statusText); }
  return r.json();
}

async function loadTables() {
  try {
    const data = await apiFetch('/tables');
    allTables = data.tables || data || [];
    renderSidebar();
    $('table-count').textContent = `${allTables.length} table${allTables.length !== 1 ? 's' : ''}`;
    $('conn-label').textContent = data.database || 'Connected';
    $('db-engine').textContent = data.engine || '';
    $('header-status').textContent = `${allTables.length} tables loaded`;
    loadSchema();
  } catch (e) {
    $('table-list').innerHTML = `<div class="empty-state" style="height:120px"><div class="msg" style="color:var(--red)">Error loading tables</div><div class="sub">${e.message}</div></div>`;
    $('conn-label').textContent = 'Disconnected';
    toast('Failed to load tables: ' + e.message, 'err');
  }
}

function renderSidebar() {
  const q = $('table-search').value.toLowerCase();
  const filtered = q ? allTables.filter(t => (t.name || t).toLowerCase().includes(q)) : allTables;
  if (!filtered.length) {
    $('table-list').innerHTML = '<div class="empty-state" style="height:80px"><div class="sub">No tables match</div></div>';
    return;
  }
  $('table-list').innerHTML = filtered.map(t => {
    const name = t.name || t;
    const count = t.rows != null ? `<span class="tbl-count">${t.rows}</span>` : '';
    const active = currentTable === name ? ' active' : '';
    return `<div class="table-item${active}" data-table="${name}">
      <span class="tbl-icon">⬡</span>
      <span class="tbl-name">${name}</span>
      ${count}
    </div>`;
  }).join('');
  $('table-list').querySelectorAll('.table-item').forEach(el => {
    el.addEventListener('click', () => selectTable(el.dataset.table));
  });
}

async function selectTable(name) {
  currentTable = name;
  currentPage = 1;
  sortCol = null;
  sortDir = 'asc';
  filterVal = $('row-filter').value = '';
  renderSidebar();
  // switch to data tab
  setTab('data');
  await loadTableData();
}

async function loadTableData() {
  if (!currentTable) return;
  $('grid-title').innerHTML = `<span>${currentTable}</span>`;
  $('grid-wrap').innerHTML = '<div class="empty-state"><div class="loader"></div><div class="msg">Loading…</div></div>';
  $('pagination').style.display = 'none';
  try {
    const params = new URLSearchParams({
      table: currentTable, page: currentPage, limit: pageSize,
      ...(sortCol ? { sort: sortCol, dir: sortDir } : {}),
      ...(filterVal ? { filter: filterVal } : {})
    });
    const data = await apiFetch(`/table-data?${params}`);
    const columns = data.columns || (data.rows?.[0] ? Object.keys(data.rows[0]) : []);
    const rows = data.rows || [];
    totalRows = data.total ?? rows.length;
    $('grid-title').innerHTML = `${currentTable} <span>${totalRows.toLocaleString()} rows</span>`;
    $('grid-wrap').innerHTML = renderTable(columns, rows);

    // sort headers
    $('grid-wrap').querySelectorAll('thead th[data-col]').forEach(th => {
      th.addEventListener('click', () => {
        const n = th.dataset.name;
        if (sortCol === n) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        else { sortCol = n; sortDir = 'asc'; }
        currentPage = 1;
        loadTableData();
      });
    });

    // row selection
    $('grid-wrap').querySelectorAll('tbody tr').forEach(tr => {
      tr.addEventListener('click', () => {
        $('grid-wrap').querySelectorAll('tbody tr').forEach(r => r.classList.remove('selected'));
        tr.classList.toggle('selected');
      });
    });

    renderPagination(totalRows);
  } catch (e) {
    $('grid-wrap').innerHTML = `<div class="empty-state"><div class="icon" style="color:var(--red)">✕</div><div class="msg" style="color:var(--red)">${e.message}</div></div>`;
    toast(e.message, 'err');
  }
}

function renderPagination(total) {
  const pages = Math.ceil(total / pageSize) || 1;
  $('pagination').style.display = 'flex';
  const start = (currentPage - 1) * pageSize + 1;
  const end = Math.min(currentPage * pageSize, total);
  $('pag-info').textContent = `${start.toLocaleString()}–${end.toLocaleString()} of ${total.toLocaleString()}`;
  $('page-prev').disabled = currentPage <= 1;
  $('page-next').disabled = currentPage >= pages;
  // page numbers (show up to 7)
  let nums = '';
  const range = (s, e) => Array.from({length: e-s+1}, (_,i)=>s+i);
  let pageList;
  if (pages <= 7) pageList = range(1, pages);
  else if (currentPage <= 4) pageList = [...range(1,5), '…', pages];
  else if (currentPage >= pages-3) pageList = [1, '…', ...range(pages-4, pages)];
  else pageList = [1, '…', ...range(currentPage-1, currentPage+1), '…', pages];
  pageList.forEach(p => {
    if (p === '…') nums += `<span style="color:var(--text2);padding:0 4px">…</span>`;
    else nums += `<button class="page-btn${p===currentPage?' current':''}" data-p="${p}">${p}</button>`;
  });
  $('page-nums').innerHTML = nums;
  $('page-nums').querySelectorAll('.page-btn').forEach(b => {
    b.addEventListener('click', () => { currentPage = +b.dataset.p; loadTableData(); });
  });
}

// ── Schema ─────────────────────────────────────────────────────────────────
async function loadSchema() {
  try {
    const data = await apiFetch('/schema');
    const tables = data.schema || data || [];
    $('schema-panel').innerHTML = tables.map(t => `
      <div class="schema-table-block open" data-schema-table="${t.name}">
        <div class="schema-table-header">
          <span class="tbl-icon" style="color:var(--text2)">⬡</span>
          <span class="s-name">${t.name}</span>
          <span class="s-count">${t.columns.length} cols</span>
          <span class="chevron">›</span>
        </div>
        <table class="schema-cols">
          ${t.columns.map(c => `
            <tr class="schema-col-row">
              <td>${c.name}${c.pk ? '<span class="badge-pk">PK</span>' : ''}</td>
              <td>${c.type}</td>
              <td>${c.nullable === false ? '<span class="badge-nn">NOT NULL</span>' : ''} ${c.default != null ? `default: ${c.default}` : ''}</td>
            </tr>`).join('')}
        </table>
      </div>`).join('');
    $('schema-panel').querySelectorAll('.schema-table-header').forEach(h => {
      h.addEventListener('click', () => h.closest('.schema-table-block').classList.toggle('open'));
    });
  } catch (e) {
    $('schema-panel').innerHTML = `<div class="empty-state"><div class="msg" style="color:var(--red)">Failed to load schema</div><div class="sub">${e.message}</div></div>`;
  }
}

// ── Query runner ───────────────────────────────────────────────────────────
async function runQuery() {
  const sql = $('sql-editor').value.trim();
  if (!sql) return;
  const btn = $('run-btn');
  btn.classList.add('loading');
  btn.textContent = '⏳ Running…';
  $('result-status').style.display = 'none';
  $('query-result-wrap').innerHTML = '<div class="empty-state"><div class="loader"></div><div class="msg">Executing…</div></div>';
  const t0 = Date.now();
  try {
    const data = await apiFetch('/query', { method: 'POST', body: JSON.stringify({ sql }) });
    const ms = Date.now() - t0;
    const rows = data.rows || [];
    const columns = data.columns || (rows[0] ? Object.keys(rows[0]) : []);
    const affected = data.affectedRows ?? null;
    $('result-status').style.display = 'flex';
    $('result-status').innerHTML = `<span class="status-ok">✓ OK</span>
      <span class="status-info">${rows.length} row${rows.length!==1?'s':''} returned</span>
      ${affected!=null?`<span class="status-info">${affected} affected</span>`:''}
      <span class="status-info">${ms}ms</span>`;
    // save page state for query results
    const savedPage = currentPage; currentPage = 1;
    $('query-result-wrap').innerHTML = renderTable(columns, rows);
    currentPage = savedPage;
    toast(`Query returned ${rows.length} rows in ${ms}ms`, 'ok');
  } catch (e) {
    $('result-status').style.display = 'flex';
    $('result-status').innerHTML = `<span class="status-err">✕ Error</span><span class="status-info">${e.message}</span>`;
    $('query-result-wrap').innerHTML = `<div class="empty-state"><div class="icon" style="color:var(--red)">✕</div><div class="msg" style="color:var(--red)">${e.message}</div></div>`;
    toast(e.message, 'err');
  } finally {
    btn.classList.remove('loading');
    btn.innerHTML = '▶ Run Query';
  }
}

// ── Export CSV ─────────────────────────────────────────────────────────────
function exportCSV() {
  const tbl = document.querySelector('#grid-wrap #data-table');
  if (!tbl) { toast('No data to export', 'info'); return; }
  const rows = [[...tbl.querySelectorAll('thead th')].slice(1).map(th => th.textContent.trim())];
  tbl.querySelectorAll('tbody tr').forEach(tr => {
    rows.push([...tr.querySelectorAll('td')].slice(1).map(td => {
      const v = td.textContent; return v.includes(',') ? `"${v}"` : v;
    }));
  });
  const csv = rows.map(r => r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
  a.download = `${currentTable || 'export'}.csv`;
  a.click();
  toast('CSV exported', 'ok');
}

// ── Line numbers ───────────────────────────────────────────────────────────
function updateLineNums() {
  const lines = $('sql-editor').value.split('\n').length;
  $('line-nums').innerHTML = Array.from({length: lines}, (_,i) => i+1).join('<br>');
  $('line-nums').scrollTop = $('sql-editor').scrollTop;
}

// ── Tabs ───────────────────────────────────────────────────────────────────
function setTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === `tab-${name}`));
}

// ── Event wiring ───────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', () => setTab(b.dataset.tab)));
$('refresh-btn').addEventListener('click', loadTables);
$('table-search').addEventListener('input', renderSidebar);
$('row-filter').addEventListener('input', () => {
  clearTimeout(rowFilterTimer);
  rowFilterTimer = setTimeout(() => { filterVal = $('row-filter').value; currentPage = 1; loadTableData(); }, 350);
});
$('page-prev').addEventListener('click', () => { if (currentPage > 1) { currentPage--; loadTableData(); } });
$('page-next').addEventListener('click', () => { const p = Math.ceil(totalRows / pageSize); if (currentPage < p) { currentPage++; loadTableData(); } });
$('page-size-select').addEventListener('change', e => { pageSize = +e.target.value; currentPage = 1; loadTableData(); });
$('run-btn').addEventListener('click', runQuery);
$('clear-editor-btn').addEventListener('click', () => { $('sql-editor').value = ''; updateLineNums(); });
$('export-csv-btn').addEventListener('click', exportCSV);
$('sql-editor').addEventListener('input', updateLineNums);
$('sql-editor').addEventListener('scroll', () => { $('line-nums').scrollTop = $('sql-editor').scrollTop; });
$('sql-editor').addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); runQuery(); }
  if (e.key === 'Tab') { e.preventDefault(); const s = $('sql-editor'); const [a,b] = [s.selectionStart, s.selectionEnd]; s.value = s.value.slice(0,a)+'  '+s.value.slice(b); s.selectionStart = s.selectionEnd = a+2; }
});

// ── Boot ───────────────────────────────────────────────────────────────────
updateLineNums();
loadTables();
</script>
</body>
</html>
