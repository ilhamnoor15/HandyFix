<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Settings — Contractor Portal</title>
  <link rel="stylesheet" href="/contractor/contractor.css"/>
  <style>
    /* "Personal info" content styled to match the user portal behavior. */
    .personal-card {
      max-width: 900px;
      margin: 0 auto;
      padding: 22px;
    }
    .personal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border-soft);
      margin-bottom: 18px;
    }
    .personal-title {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 240px;
    }
    .back-link {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--surface-2);
      border: 1px solid var(--border-soft);
      color: var(--text-primary);
      text-decoration: none;
      transition: all var(--transition);
      flex-shrink: 0;
    }
    .back-link:hover {
      border-color: var(--gold-border);
      transform: translateX(-2px);
    }
    .personal-title h3 {
      margin: 0;
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      color: var(--text-primary);
      line-height: 1.2;
    }
    .personal-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 3px;
    }
    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #saveCancelGroup { display: none; gap: 10px; }
    #saveCancelGroup.visible { display: inline-flex; }
  </style>
</head>
<body>
<div class="portal-layout">

  <script src='/contractor/shared-nav.js'></script>

  <!-- MAIN -->
  <main class="main-content" id="mainContent">
    <header class="top-header">
      <div class="header-left">
        <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        <div>
          <div class="page-title">Settings</div>
          <div class="breadcrumb">Personal information</div>
        </div>
      </div>
      <div class="header-right">
        <div class="header-chip" id="headerDate">—</div>
        <button class="theme-toggle-btn" title="Toggle Theme">☀️</button>
        <div class="hdr-btn" title="Notifications">🔔<span class="hdr-notif-dot"></span></div>
      </div>
    </header>

    <div class="page-content">
      <div class="card personal-card">
        <div class="personal-head">
          <div class="personal-title">
            <a href="/contract/profile" class="back-link" aria-label="Back to profile">←</a>
            <div>
              <h3>Personal Information</h3>
              <div class="personal-subtitle">View and edit your contact details</div>
            </div>
          </div>

          <div class="actions" id="actionButtons">
            <button type="button" class="btn btn-maroon" id="editBtn">Edit Details</button>
            <div id="saveCancelGroup">
              <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
              <button type="submit" class="btn btn-primary" id="saveBtn" form="personalForm">Save Changes</button>
            </div>
          </div>
        </div>

        <form id="personalForm">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="first_name">First Name</label>
              <input class="form-input" type="text" id="first_name" disabled>
            </div>
            <div class="form-group">
              <label class="form-label" for="last_name">Last Name</label>
              <input class="form-input" type="text" id="last_name" disabled>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="email">Email Address</label>
              <input class="form-input" type="email" id="email" disabled>
              <div class="form-hint">Email is used as your login identifier.</div>
            </div>
            <div class="form-group">
              <label class="form-label" for="contact_number">Phone Number</label>
              <input class="form-input" type="text" id="contact_number" disabled>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="address">Address</label>
            <textarea class="form-input" id="address" rows="3" disabled></textarea>
          </div>
        </form>
      </div>
    </div><!-- /page-content -->
  </main>
</div>

<div id="toast-container"></div>
<div class="modal-overlay" id="logoutModal">
  <div class="modal" style="max-width:360px;text-align:center">
    <div style="font-size:44px;margin-bottom:12px">🚪</div>
    <div class="modal-title" style="text-align:center;margin-bottom:8px">Log Out?</div>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:22px">You will be returned to the login screen.</p>
    <div style="display:flex;gap:10px;justify-content:center">
      <button class="btn btn-secondary" onclick="closeModal('logoutModal')">Stay</button>
      <button class="btn btn-maroon" onclick="confirmLogout()">Yes, Log Out</button>
    </div>
  </div>
</div>

<script src="/contractor/contractor.js"></script>
<script>
  async function loadProfile() {
    try {
      const res = await fetch('/api/fetchProfileUser', { method: 'GET', credentials: 'include' });
      if (!res.ok) throw new Error('Failed to fetch profile');
      const user = await res.json();

      document.getElementById('first_name').value = user.first_name || '';
      document.getElementById('last_name').value = user.last_name || '';
      document.getElementById('email').value = user.email || '';
      document.getElementById('contact_number').value = user.contact_number || '';
      document.getElementById('address').value = user.address || '';
    } catch (err) {
      console.error(err);
      if (typeof showToast === 'function') showToast('Could not load profile data.', 'error');
    }
  }

  const editBtn = document.getElementById('editBtn');
  const cancelBtn = document.getElementById('cancelBtn');
  const saveCancelGroup = document.getElementById('saveCancelGroup');
  const form = document.getElementById('personalForm');

  const editableIds = ['first_name', 'last_name', 'contact_number', 'address'];

  function setEditing(on) {
    editableIds.forEach((id) => {
      const el = document.getElementById(id);
      el.disabled = !on;
    });
    editBtn.style.display = on ? 'none' : 'inline-flex';
    saveCancelGroup.classList.toggle('visible', on);
  }

  editBtn.addEventListener('click', () => setEditing(true));

  cancelBtn.addEventListener('click', async () => {
    if (!confirm('Discard changes?')) return;
    await loadProfile();
    setEditing(false);
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const payload = {
      first_name: document.getElementById('first_name').value.trim(),
      last_name: document.getElementById('last_name').value.trim(),
      contact_number: document.getElementById('contact_number').value.trim(),
      address: document.getElementById('address').value.trim(),
    };

    try {
      const res = await fetch('/api/editProfileUser', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });

      if (!res.ok) throw new Error('Save failed');
      setEditing(false);
      if (typeof showToast === 'function') showToast('Changes saved successfully!', 'success');
    } catch (err) {
      console.error(err);
      if (typeof showToast === 'function') showToast('Could not save changes. Please try again.', 'error');
    }
  });

  // Boot
  loadProfile();
  setEditing(false);
</script>
</body>
</html>
