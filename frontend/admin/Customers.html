<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Customer</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --maroon:      #7a1d1d;
      --dark-orange: #c2410c;
      --dirty-white: #f5f0e6;
      --black:       #111;
      --gray:        #555;
      --light-gray:  #ddd;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--dirty-white);
      color: var(--black);
      min-height: 100vh;
    }

    .topbar {
      background: var(--maroon);
      color: white;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      box-shadow: 0 3px 10px rgba(0,0,0,0.2);
    }

    .logo       { font-weight: bold; font-size: 1.5rem; }
    .panel-name { font-size: 1.35rem; letter-spacing: 1.2px; }
    .right      { display: flex; align-items: center; gap: 1.8rem; }
    .bell       { font-size: 1.4rem; cursor: pointer; }
    .profile    { font-size: 1.15rem; }
    .hamburger  { font-size: 1.7rem; cursor: pointer; display: none; color: white; }

    .sidebar {
      width: 240px;
      background: var(--dark-orange);
      color: white;
      height: calc(100vh - 64px);
      position: fixed;
      top: 64px;
      left: 0;
      overflow-y: auto;
      transition: transform 0.3s ease;
    }

    .sidebar ul {
      list-style: none;
      padding: 1.2rem 0;
    }

    .sidebar li {
      padding: 1rem 1.6rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .sidebar li:hover,
    .sidebar li.active {
      background: rgba(0,0,0,0.25);
    }

    .sidebar i {
      margin-right: 12px;
      width: 22px;
      text-align: center;
    }

    .main {
      margin-left: 240px;
      margin-top: 64px;
      padding: 2rem;
      min-height: calc(100vh - 64px);
    }

    h1 {
      color: var(--maroon);
      margin-bottom: 2rem;
      font-size: 2rem;
    }

    .table-wrapper {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 1.1rem 1.3rem;
      text-align: left;
      border-bottom: 1px solid var(--light-gray);
    }

    th {
      background: var(--maroon);
      color: white;
      font-weight: 600;
    }

    tr:hover {
      background: #fbf8f4;
    }

    tr.selected {
      background: #ffe0cc !important;
    }

    .action-buttons {
      padding: 1.5rem;
      text-align: right;
      border-top: 1px solid var(--light-gray);
    }

    .btn {
      padding: 0.8rem 1.6rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      margin-left: 1rem;
    }
    
    #formContainer {
      display: none;
    }

    #formContainer input, #formContainer select {
      width: 100%;
      padding: 0.8rem;
      margin-bottom: 1.2rem;
      border: 1px solid var(--light-gray);
      border-radius: 6px;
      font-size: 1rem;
    }

    .btn-add    { background: var(--dark-orange); color: white; }
    .btn-edit   { background: #0288d1; color: white; }
    .btn-delete { background: #c62828; color: white; }

    .btn-add:hover    { background: #a0360a; }
    .btn-edit:hover   { background: #0277bd; }
    .btn-delete:hover { background: #b71c1c; }

    @media (max-width: 992px) {
      .sidebar {
        transform: translateX(-100%);
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .main {
        margin-left: 0;
      }
      .hamburger {
        display: block !important;
      }
    }
  </style>
</head>
<body>

<header class="topbar">
  <div class="logo">HandyFix</div>
  <div class="panel-name">ADMIN PANEL</div>
  <div class="right">
    <i class="fas fa-bell bell"></i>
    <span class="profile">Admin Name</span>
    <i class="fas fa-bars hamburger" id="menuBtn"></i>
  </div>
</header>

<nav class="sidebar" id="sidebar">
  <ul>
    <li class="active" data-page="/admin/">
      <i class="fas fa-tachometer-alt"></i> Dashboard
    </li>
    <li data-page="/admin/service">
      <i class="fas fa-list-ul"></i> Requests
    </li>
    <li data-page="/admin/contractor">
      <i class="fas fa-hard-hat"></i> Contractors
    </li>
    <li data-page="/admin/customers">
      <i class="fas fa-users"></i> Customers
    </li>
    <li data-page="/admin/assignment">
      <i class="fas fa-link"></i> Assignments
    </li>
    <li data-page="/admin/messages">
      <i class="fas fa-comment-dots"></i> Messages
    </li>
    <li data-page="/admin/reports">
      <i class="fas fa-chart-bar"></i> Reports
    </li>
    <li data-page="/admin/settings">
      <i class="fas fa-cog"></i> Settings
    </li>
    <li data-page="Login.html">
      <i class="fas fa-sign-out-alt"></i> Logout</li>
  </ul>
</nav>

<main class="main">
  <h1>Customer</h1>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>First Name</th>
          <th>Last Name</th>
          <th>Email</th>
          <th>Contact</th>
          <th>Age</th>
          <th>Type</th>
        </tr>
      </thead>
      <tbody id="customerTableBody">
        <!-- Rows will be populated dynamically from JSON -->
      </tbody>
    </table>
  </div>

  <div class="action-buttons">
    <button class="btn btn-add">Add Customer</button>
    <button class="btn btn-edit">Edit Customer</button>
    <button class="btn btn-delete">Delete Customer</button> 
  </div>

  <div id="formContainer">
    <h3 id="formTitle">Add Customer</h3>

    <input type="text" id="firstName" placeholder="First Name">
    <input type="text" id="lastName" placeholder="Last Name">
    <input type="email" id="email" placeholder="Email">
    <input type="text" id="contact" placeholder="Contact Number">
    <input type="number" id="age" placeholder="Age">
    <input type="text" id="address" placeholder="Address">
    <select id="type">
      <option value="">Select Type</option>
      <option value="user">User</option>
      <option value="contractor">Contractor</option>
      <option value="admin">Admin</option>
    </select>
    <input type="text" id="password" placeholder="Password">

    <br><br>

    <button id="saveBtn" class="btn btn-add">Save Changes</button>
    <button id="cancelBtn" class="btn btn-delete">Cancel</button>
  </div>
</div>
</main>

<script>
  // Customer data in JSON format


  async function fetchCustomers() {
    try {
      const response = await fetch('http://localhost:3000/api/AllCustomerUsers');
      const data = await response.json();
      return data;
    } catch (error) {
      console.error('Error fetching customers:', error);
      return [];
    }
  }

  let customersData = [];

  let selectedRow = null;
  let editMode = false;
  let selectedCustomerId = null;

  // Function to render table from JSON data
  function renderTable() {
    const tbody = document.getElementById('customerTableBody');
    tbody.innerHTML = '';

    customersData.forEach(customer => {
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${customer.id}</td>
        <td>${customer.first_name || ''}</td>
        <td>${customer.last_name || ''}</td>
        <td>${customer.email || ''}</td>
        <td>${customer.contact_number || ''}</td>
        <td>${customer.age || ''}</td>
        <td>${customer.type || ''}</td>
      `;

      row.addEventListener('click', () => {
        document.querySelectorAll('tbody tr').forEach(r => r.classList.remove('selected'));
        row.classList.add('selected');
        selectedRow = row;
        selectedCustomerId = customer.id;
      });

      tbody.appendChild(row);
    });
  }

  document.getElementById('menuBtn').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
  });

  document.querySelectorAll('.sidebar li').forEach(item => {
    item.addEventListener('click', function() {
      const page = this.getAttribute('data-page');
      if (page) {
        window.location.href = page;
      }
    });
  });

  document.addEventListener('DOMContentLoaded', async () => {
    // Fetch and populate customersData
    const fetchedData = await fetchCustomers();
    if (fetchedData && fetchedData.length > 0) {
      customersData.push(...fetchedData);
    }

    // Render table from JSON
    renderTable();

    const currentFile = window.location.pathname.split('/').pop() || 'Customer.html';
    document.querySelectorAll('.sidebar li').forEach(li => {
      const page = li.getAttribute('data-page');
      if (page === currentFile) {
        li.classList.add('active');
      } else {
        li.classList.remove('active');
      }
    });

    document.querySelector('.btn-add').addEventListener('click', () => {
      document.getElementById('formContainer').style.display = 'block';
      document.getElementById('formTitle').textContent = 'Add Customer';
      editMode = false;

      document.getElementById('firstName').value = '';
      document.getElementById('lastName').value = '';
      document.getElementById('email').value = '';
      document.getElementById('contact').value = '';
      document.getElementById('age').value = '';
      document.getElementById('address').value = '';
      document.getElementById('type').value = '';
      document.getElementById('password').value = '';
    });

    document.querySelector('.btn-edit').addEventListener('click', async () => {
      if (!selectedCustomerId) {
        alert('Please select a row first!');
        return;
      }

      document.getElementById('formContainer').style.display = 'block';
      document.getElementById('formTitle').textContent = 'Edit Customer';
      editMode = true;

      // Fetch fresh data from API
      try {
        const response = await fetch(`http://localhost:3000/api/fetchUser/${selectedCustomerId}`);
        if (!response.ok) {
          alert('Error loading user dataA');
          return;
        }
        const customer = await response.json();
        
        document.getElementById('firstName').value = customer.first_name || '';
        document.getElementById('lastName').value = customer.last_name || '';
        document.getElementById('email').value = customer.email || '';
        document.getElementById('contact').value = customer.contact_number || '';
        document.getElementById('age').value = customer.age || '';
        document.getElementById('address').value = customer.address || '';
        document.getElementById('type').value = customer.type || '';
        document.getElementById('password').value = customer.password || '';
      } catch (error) {
        console.error('Error fetching user data:', error);
        alert('Error loading user data');
      }
    });

    document.querySelector('.btn-delete').addEventListener('click', () => {
      if (!selectedCustomerId) {
        alert('Please select a row first!');
        return;
      }

      if (confirm('Are you sure you want to delete this customer?')) {
        const index = customersData.findIndex(c => c.id === selectedCustomerId);
        if (index > -1) {
          customersData.splice(index, 1);
          renderTable();
          selectedRow = null;
          selectedCustomerId = null;
        }
      }
    });

    document.getElementById('saveBtn').addEventListener('click', async () => {
      const firstName = document.getElementById('firstName').value;
      const lastName = document.getElementById('lastName').value;
      const email = document.getElementById('email').value;
      const contact = document.getElementById('contact').value;
      const age = document.getElementById('age').value;
      const address = document.getElementById('address').value;
      const type = document.getElementById('type').value;
      const password = document.getElementById('password').value;

      if (editMode && selectedCustomerId) {
        // Update existing customer via API
        try {
          const response = await fetch(`http://localhost:3000/api/EditUsers/${selectedCustomerId}`, {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              first_name: firstName,
              last_name: lastName,
              email: email,
              contact_number: contact,
              age: parseInt(age) || null,
              address: address,
              type: type,
              password: password,
            }),
          });

          const result = await response.json();
          if (!response.ok) {
            alert('Error updating user: ' + (result.error || 'Unknown error'));
            return;
          }

          alert('User updated successfully');
          // Update local data
          const customer = customersData.find(c => c.id === selectedCustomerId);
          if (customer) {
            customer.first_name = firstName;
            customer.last_name = lastName;
            customer.email = email;
            customer.contact_number = contact;
            customer.age = age;
            customer.address = address;
            customer.type = type;
            customer.password = password;
          }
        } catch (error) {
          console.error('Error updating user:', error);
          alert('Error updating user');
          return;
        }
      } else {
        // Add new customer via API
        try {
          const response = await fetch('http://localhost:3000/api/AddUser', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              first_name: firstName,
              last_name: lastName,
              email: email,
              contact_number: contact,
              age: parseInt(age) || null,
              address: address,
              type: type,
              password: password,
            }),
          });

          const result = await response.json();
          if (!response.ok) {
            alert('Error adding user: ' + (result.error || 'Unknown error'));
            return;
          }

          alert('User added successfully');
          // Refresh the table data from server
          const fetchedData = await fetchCustomers();
          customersData.length = 0; // Clear existing data
          if (fetchedData && fetchedData.length > 0) {
            customersData.push(...fetchedData);
          }
        } catch (error) {
          console.error('Error adding user:', error);
          alert('Error adding user');
          return;
        }
      }

      renderTable();
      document.getElementById('formContainer').style.display = 'none';
      selectedRow = null;
      selectedCustomerId = null;
    });

    document.getElementById('cancelBtn').addEventListener('click', () => {
      document.getElementById('formContainer').style.display = 'none';
    });
  });
</script>

</body>
</html>
