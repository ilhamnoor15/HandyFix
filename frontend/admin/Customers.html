<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Customer</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --maroon:      #7a1d1d;
      --dark-orange: #c2410c;
      --dirty-white: #f5f0e6;
      --black:       #111;
      --gray:        #555;
      --light-gray:  #ddd;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--dirty-white);
      color: var(--black);
      min-height: 100vh;
    }

    .topbar {
      background: var(--maroon);
      color: white;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      box-shadow: 0 3px 10px rgba(0,0,0,0.2);
    }

    .logo       { font-weight: bold; font-size: 1.5rem; }
    .panel-name { font-size: 1.35rem; letter-spacing: 1.2px; }
    .right      { display: flex; align-items: center; gap: 1.8rem; }
    .bell       { font-size: 1.4rem; cursor: pointer; }
    .profile    { font-size: 1.15rem; }
    .hamburger  { font-size: 1.7rem; cursor: pointer; display: none; color: white; }

    .sidebar {
      width: 240px;
      background: var(--dark-orange);
      color: white;
      height: calc(100vh - 64px);
      position: fixed;
      top: 64px;
      left: 0;
      overflow-y: auto;
      transition: transform 0.3s ease;
    }

    .sidebar ul {
      list-style: none;
      padding: 1.2rem 0;
    }

    .sidebar li {
      padding: 1rem 1.6rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .sidebar li:hover,
    .sidebar li.active {
      background: rgba(0,0,0,0.25);
    }

    .sidebar i {
      margin-right: 12px;
      width: 22px;
      text-align: center;
    }

    .main {
      margin-left: 240px;
      margin-top: 64px;
      padding: 2rem;
      min-height: calc(100vh - 64px);
    }

    h1 {
      color: var(--maroon);
      margin-bottom: 2rem;
      font-size: 2rem;
    }

    .table-wrapper {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 1.1rem 1.3rem;
      text-align: left;
      border-bottom: 1px solid var(--light-gray);
    }

    th {
      background: var(--maroon);
      color: white;
      font-weight: 600;
    }

    tr:hover {
      background: #fbf8f4;
    }

    tr.selected {
      background: #ffe0cc !important;
    }

    .action-buttons {
      padding: 1.5rem;
      text-align: right;
      border-top: 1px solid var(--light-gray);
    }

    .btn {
      padding: 0.8rem 1.6rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      margin-left: 1rem;
    }
    
    #formContainer {
      display: none;
    }

    #formContainer input, #formContainer select {
      width: 100%;
      padding: 0.8rem;
      margin-bottom: 1.2rem;
      border: 1px solid var(--light-gray);
      border-radius: 6px;
      font-size: 1rem;
    }

    .btn-add    { background: var(--dark-orange); color: white; }
    .btn-edit   { background: #0288d1; color: white; }
    .btn-delete { background: #c62828; color: white; }

    .btn-add:hover    { background: #a0360a; }
    .btn-edit:hover   { background: #0277bd; }
    .btn-delete:hover { background: #b71c1c; }

    @media (max-width: 992px) {
      .sidebar {
        transform: translateX(-100%);
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .main {
        margin-left: 0;
      }
      .hamburger {
        display: block !important;
      }
    }
  </style>
</head>
<body>

<header class="topbar">
  <div class="logo">HandyFix</div>
  <div class="panel-name">ADMIN PANEL</div>
  <div class="right">
    <i class="fas fa-bell bell"></i>
    <span class="profile">Admin Name</span>
    <i class="fas fa-bars hamburger" id="menuBtn"></i>
  </div>
</header>

<nav class="sidebar" id="sidebar">
  <ul>
    <li class="active" data-page="/admin/">
      <i class="fas fa-tachometer-alt"></i> Dashboard
    </li>
    <li data-page="/admin/service">
      <i class="fas fa-list-ul"></i> Requests
    </li>
    <li data-page="/admin/contractor">
      <i class="fas fa-hard-hat"></i> Contractors
    </li>
    <li data-page="/admin/customers">
      <i class="fas fa-users"></i> Customers
    </li>
    <li data-page="/admin/assignment">
      <i class="fas fa-link"></i> Assignments
    </li>
    <li data-page="/admin/messages">
      <i class="fas fa-comment-dots"></i> Messages
    </li>
    <li data-page="/admin/reports">
      <i class="fas fa-chart-bar"></i> Reports
    </li>
    <li data-page="/admin/settings">
      <i class="fas fa-cog"></i> Settings
    </li>
    <li data-page="Login.html">
      <i class="fas fa-sign-out-alt"></i> Logout</li>
  </ul>
</nav>

<main class="main">
  <h1>Customer</h1>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Customer ID</th>
          <th>Name</th>
          <th>Contact</th>
          <th>Address</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>301</td>
          <td>Juan Dela Cruz</td>
          <td>09123456789</td>
          <td>QC</td>
        </tr>
        <tr>
          <td>302</td>
          <td>Maria Santos</td>
          <td>09876543210</td>
          <td>QC</td>
        </tr>
  
      </tbody>
    </table>
  </div>

  <div class="action-buttons">
    <button class="btn btn-add">Add Customer</button>
    <button class="btn btn-edit">Edit Customer</button>
    <button class="btn btn-delete">Delete Customer</button> 
  </div>

  <div id="formContainer">
    <h3 id="formTitle">Add Customer</h3>

    <input type="text" id="name" placeholder="Name">
    <input type="text" id="contact" placeholder="Contact Number">
    <input type="text" id="address" placeholder="Address">

    <br><br>

    <button id="saveBtn" class="btn btn-add">Save Changes</button>
    <button id="cancelBtn" class="btn btn-delete">Cancel</button>
  </div>
</div>
</main>

<script>
  document.getElementById('menuBtn').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
  });

  document.querySelectorAll('.sidebar li').forEach(item => {
    item.addEventListener('click', function() {
      const page = this.getAttribute('data-page');
      if (page) {
        window.location.href = page;
      }
    });
  });

  document.addEventListener('DOMContentLoaded', () => {
    const currentFile = window.location.pathname.split('/').pop() || 'Customer.html';
    document.querySelectorAll('.sidebar li').forEach(li => {
      const page = li.getAttribute('data-page');
      if (page === currentFile) {
        li.classList.add('active');
      } else {
        li.classList.remove('active');
      }
    });

    document.querySelectorAll('tbody tr').forEach(row => {
    row.addEventListener('click', () => {
      document.querySelectorAll('tbody tr.selected').forEach(r => r.classList.remove('selected'));
      row.classList.add('selected');
    });
  });

  let selectedRow = null;
  let editMode = false;

  document.querySelectorAll('tbody tr').forEach(row => {
    row.addEventListener('click', () => {
      document.querySelectorAll('tbody tr').forEach(r => r.classList.remove('selected'));
      row.classList.add('selected');
      selectedRow = row;
    });
  });

  document.querySelector('.btn-add').addEventListener('click', () => {
    document.getElementById('formContainer').style.display = 'block';
    document.getElementById('formTitle').textContent = 'Add Customer';
    editMode = false;

    document.getElementById('name').value = '';
    document.getElementById('contact').value = '';
    document.getElementById('address').value = '';
  });

  document.querySelector('.btn-edit').addEventListener('click', () => {
    if (!selectedRow) {
      alert('Please select a row first!');
      return;
    }

    document.getElementById('formContainer').style.display = 'block';
    document.getElementById('formTitle').textContent = 'Edit Customer';
    editMode = true;

    document.getElementById('name').value = selectedRow.cells[1].textContent;
    document.getElementById('contact').value = selectedRow.cells[2].textContent;
    document.getElementById('address').value = selectedRow.cells[3].textContent;
  });

  document.querySelector('.btn-delete').addEventListener('click', () => {
    if (!selectedRow) {
      alert('Please select a row first!');
      return;
    }

    if (confirm('Are you sure you want to delete this customer?')) {
      selectedRow.remove();
      selectedRow = null;
    }
  });

  document.getElementById('saveBtn').addEventListener('click', () => {
    const name = document.getElementById('name').value;
    const contact = document.getElementById('contact').value;
    const address = document.getElementById('address').value;

    const tbody = document.querySelector('tbody');

    if (editMode && selectedRow) {
  
      selectedRow.cells[1].textContent = name;
      selectedRow.cells[2].textContent = contact;
      selectedRow.cells[3].textContent = address;
    } else {
      
      const newRow = document.createElement('tr');

      newRow.innerHTML = `
        <td>${Math.floor(Math.random() * 1000)}</td>
        <td>${name}</td>
        <td>${contact}</td>
        <td>${address}</td>
      `;

      newRow.addEventListener('click', () => {
        document.querySelectorAll('tbody tr').forEach(r => r.classList.remove('selected'));
        newRow.classList.add('selected');
        selectedRow = newRow;
      });

      tbody.appendChild(newRow);
    }

    document.getElementById('formContainer').style.display = 'none';
  });

  document.getElementById('cancelBtn').addEventListener('click', () => {
    document.getElementById('formContainer').style.display = 'none';
  });
  });
</script>

</body>
</html>
