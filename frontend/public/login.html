<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HandyFix | Log In</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/user/style.css" />
</head>

<body>

    <div class="main-container">

        <div class="left-panel">
            <div class="bg-logo">H</div>
            <div class="branding-content text-start">
                <h1 class="mb-4" style="font-size: 5rem; line-height: 1;">Your trusted partner <br> for a better home.
                </h1>
                <h3 class="fw-light mb-5" style="opacity: 0.9;">Find trusted professionals for your home <br> repairs in
                    just a few clicks.</h3>
                <h3 class="fw-bold mb-5">Join HandyFix today.</h3>
            </div>
        </div>

        <div class="right-panel">
            <div class="login-card">

                <div class="branding">
                    <h1 class="logo-text-maroon">LOGO</h1>
                    <p class="sub-logo-text">HandyFix</p>
                </div>

                <h5 class="fw-bold mb-4" style="color: #8B2323; letter-spacing: 0.5px;">Log in to your account</h5>

                <form>
                    <div class="input-wrapper">
                        <span><i class="bi bi-person"></i></span>
                        <input type="email" class="form-control" placeholder="Email">
                    </div>

                    <div class="input-wrapper">
                        <span><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" placeholder="Password">
                    </div>

                    <div class="mt-4">
                        <a onclick="redirect()" class="btn btn-gold w-100 py-2 fw-bold text-decoration-none text-center">Log
                            In</a>
                    </div>
                    <select id="rolesLogin" name="role">
                        <option value="user">User</option>
                        <option value="contractor">Contractor</option>
                        <option value="admin">Admin</option>


                    </select>

                    <p class="mt-4 text-muted small">
                        No account yet? <a href="/register/" class="signup-link">Register</a>
                    </p>
                </form>

            </div>
        </div>

    </div>

    <script>

        function loginCheck(){
            const email = document.querySelector('input[type="email"]').value;
            const password = document.querySelector('input[type="password"]').value;

            if (!email || !password) {
                alert("Please enter both email and password.");
                return false;
            }



            return true;
        }

        async function redirect() {

            const checkLog = loginCheck();

            if(!checkLog) return;

            const response = await fetch('/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    email: document.querySelector('input[type="email"]').value,
                    password: document.querySelector('input[type="password"]').value
                })
            });

            

            const data = await response.json();

            if(!data.success) {
                alert("Login failed: " + (data.error || "Unknown error"));
                return;
            }

            const role = document.getElementById('rolesLogin').value;
            console.log(role);
 
            switch (role) {
                case 'user': 
                window.location.href = '/user';
                break;
                case 'contractor': 
                window.location.href = '/contract';
                break;
                case 'admin':
                    window.location.href = '/admin';
                break;

                default: 
                 window.location.href = '/user';
                break;
            }
        }
    </script>

</body>

</html>
