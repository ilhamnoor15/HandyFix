<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
</head>
<body>

  <h1>Register</h1>

  <form id="registerForm">
      <label>First Name:</label><br>
      <input type="text" name="first_name" required><br><br>

      <label>Last Name:</label><br>
      <input type="text" name="last_name" required><br><br>

      <label>Age:</label><br>
      <input type="number" name="age" required><br><br>

      <label>Email:</label><br>
      <input type="email" name="email" required><br><br>

      <label>Password:</label><br>
      <input type="password" name="password" required><br><br>

      <label>Contact Number:</label><br>
      <input type="text" name="contact_number" required><br><br>

      <label>Address:</label><br>
      <input type="text" name="address" required><br><br>

      <button type="submit">Register</button>
  </form>

  <p id="responseMessage"></p>

  <script>
    const form = document.getElementById("registerForm");
    const responseMessage = document.getElementById("responseMessage");

    form.addEventListener("submit", async (e) => {
      e.preventDefault(); 
      const formData = new FormData(form);
      const data = Object.fromEntries(formData.entries());

      try {
        const res = await fetch("/api/register", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(data)
        });

        const result = await res.json();

        if (res.ok) {
          responseMessage.style.color = "green";
          responseMessage.textContent = result.message || "Registration successful!";
          form.reset(); // optional: clear form
        } else {
          responseMessage.style.color = "red";
          responseMessage.textContent = result.error || "Registration failed.";
        }
      } catch (err) {
        responseMessage.style.color = "red";
        responseMessage.textContent = "Error connecting to server.";
        console.error(err);
      }
    });
  </script>

</body>
</html>
