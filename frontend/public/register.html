<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HandyFix - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/user/style.css"/>
    

</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card border-0 shadow-sm p-4 py-5 rounded-4 text-center" style="width: 100%; max-width: 420px;">
        
        <div class="logo-wrapper">
            <h1 class="logo-text-main">LOGO</h1>
            <span class="logo-text-sub">HandyFix</span>
            <h4 class="page-header-title">Create an account</h4>
        </div>

<form id="registerForm">

    <div class="input-group mb-3">
        <span class="input-group-text"><i class="fas fa-user"></i></span>
        <input type="text" name="first_name" class="form-control custom-input shadow-none" placeholder="First Name" required>
    </div>


    <div class="input-group mb-3">
        <span class="input-group-text"><i class="fas fa-user"></i></span>
        <input type="text" name="last_name" class="form-control custom-input shadow-none" placeholder="Last Name" required>
    </div>


    <div class="input-group mb-3">
        <span class="input-group-text"><i class="fas fa-calendar"></i></span>
        <input type="number" name="age" class="form-control custom-input shadow-none" placeholder="Age" required>
    </div>


    <div class="input-group mb-3">
        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
        <input type="email" name="email" class="form-control custom-input shadow-none" placeholder="Email Address" required>
    </div>


    <div class="input-group mb-3">
        <span class="input-group-text"><i class="fas fa-lock"></i></span>
        <input type="password" name="password" class="form-control custom-input shadow-none" placeholder="Password" required>
    </div>


    <div class="input-group mb-3">
        <span class="input-group-text"><i class="fas fa-phone"></i></span>
        <input type="text" name="contact_number" class="form-control custom-input shadow-none" placeholder="Contact Number" required>
    </div>


    <div class="input-group mb-4">
        <span class="input-group-text"><i class="fas fa-home"></i></span>
        <input type="text" name="address" class="form-control custom-input shadow-none" placeholder="Address" required>
    </div>

    <p id="responseMessage"></p>

    <button type="submit" class="btn btn-register w-100 text-white rounded-3 mb-3">
        Register
    </button>
</form>

        <p class="small text-muted mb-0">
            Already have an account? <a href="/login" class="login-link">Log In</a>
        </p>
    </div>
    
</div>


  <script>
    const form = document.getElementById("registerForm");
    const responseMessage = document.getElementById("responseMessage");

    form.addEventListener("submit", async (e) => {
      e.preventDefault(); 
      const formData = new FormData(form);
      const data = Object.fromEntries(formData.entries());

      try {
        const res = await fetch("/api/register", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(data)
        });

        const result = await res.json();

        if (res.ok) {
          responseMessage.style.color = "green";
          responseMessage.textContent = result.message || "Registration successful!";
          form.reset(); // optional: clear form
          window.location.href = '/user/dashboard';
        } else {
          responseMessage.style.color = "red";
          responseMessage.textContent = result.error || "Registration failed.";
        }
      } catch (err) {
        responseMessage.style.color = "red";
        responseMessage.textContent = "Error connecting to server.";
        console.error(err);
      }
    });
  </script>

</body>
</html>
